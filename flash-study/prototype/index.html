<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>フラッシュ学習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* 面（既存維持） */
    --bg:#171310;--bg2:#1f1a15;--surface:#241e18;--line:#3a3128;
    --text:#f1e9dd;
    /* muted: 本文級で4.5:1を満たすよう明度UP。12px以下用に強muted */
    --muted:#c8bdac;--muted-strong:#cabfae;
    /* アクセント階層（塗りは主役CTAとORP焦点のみ） */
    --accent:#e0823f;--accent-600:#eb9152;--accent-700:#c96d2e;
    --accent-weak:#e0823f29;--on-accent:#1a1006;
    /* 状態色（正誤は色＋✓/✗の二重符号化を必須に） */
    --good:#6fb98f;--bad:#d9686a;--good-line:#3c5546;--bad-line:#6b3b3c;
    /* タイポスケール（rem基盤・整数px相当） */
    --fs-xs:.6875rem;--fs-sm:.75rem;--fs-base:.8125rem;--fs-md:.875rem;--fs-lg:.9375rem;--fs-xl:1.125rem;
    --fw-reg:400;--fw-med:500;--fw-bold:700;--ls-label:.08em;--ls-head:.02em;
    /* 余白（4pxグリッド） */
    --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:24px;--sp-6:32px;
    /* 角丸（4段） */
    --r-sm:9px;--r-md:13px;--r-lg:16px;--r-pill:999px;
    /* 影（elevation 3段） */
    --shadow-1:0 1px 2px rgba(0,0,0,.30);--shadow-2:0 4px 12px rgba(0,0,0,.35);
    --shadow-cta:0 4px 14px rgba(224,130,63,.18);--shadow-inset:inset 0 1px 0 rgba(255,255,255,.03);
    /* モーション */
    --t-fast:.15s;--t-base:.2s;--t-slow:.3s;
    /* 表示用フォント（没入面・clampのまま） */
    --flash-fs:clamp(34px,11vw,56px);--lead-fs:clamp(24px,6.5vw,32px);--score-fs:64px;
    --serif:'Shippori Mincho',"Hiragino Mincho ProN","Yu Mincho",serif;
    --sans:'Zen Kaku Gothic New',"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  }
  html{font-size:100%;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:radial-gradient(120% 80% at 50% -10%, #2a221b 0%, var(--bg) 55%),var(--bg);
    color:var(--text);font-family:var(--sans);font-size:var(--fs-md);-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
  /* キーボード可視フォーカス（WCAG 2.4.7）。マウス時は抑制 */
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:inherit;}
  :focus:not(:focus-visible){outline:none;}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0;}
  #app{max-width:560px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;
    padding:max(22px,env(safe-area-inset-top)) max(20px,env(safe-area-inset-right)) calc(28px + env(safe-area-inset-bottom)) max(20px,env(safe-area-inset-left));}
  .top{display:flex;align-items:center;gap:var(--sp-2);margin-bottom:var(--sp-1);}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);flex:none;}
  .top h1{font-size:var(--fs-lg);font-weight:var(--fw-bold);letter-spacing:var(--ls-head);margin:0;color:var(--muted);}
  .screen{flex:1;display:flex;flex-direction:column;animation:fade var(--t-slow) ease both;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  .lead{font-family:var(--serif);font-weight:var(--fw-bold);font-size:var(--lead-fs);line-height:1.3;margin:var(--sp-4) 0 var(--sp-1);}
  .lead em{color:var(--accent);font-style:normal;}
  .sub{color:var(--muted);font-size:var(--fs-base);line-height:1.7;margin-bottom:var(--sp-4);}
  .label{font-size:var(--fs-sm);letter-spacing:var(--ls-label);color:var(--muted);margin:var(--sp-5) 0 var(--sp-2);}

  /* 学習サマリ帯（ライブラリ先頭） */
  .sumbar{display:flex;align-items:center;gap:var(--sp-3);flex-wrap:wrap;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--r-lg);padding:var(--sp-3) var(--sp-4);box-shadow:var(--shadow-1);margin-bottom:var(--sp-4);}
  .sumbar .stat{display:flex;flex-direction:column;gap:2px;}
  .sumbar .stat b{font-family:var(--serif);font-size:var(--fs-xl);color:var(--text);line-height:1;}
  .sumbar .stat span{font-size:var(--fs-xs);color:var(--muted-strong);}
  .sumbar .btn{margin-left:auto;}

  .cards{display:flex;flex-direction:column;gap:var(--sp-3);}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:var(--sp-4);
    text-align:left;cursor:pointer;color:var(--text);font-family:var(--sans);transition:box-shadow var(--t-fast),border-color var(--t-fast),transform var(--t-fast);
    display:flex;align-items:center;gap:var(--sp-3);box-shadow:var(--shadow-1);}
  .card:hover{box-shadow:var(--shadow-2);border-color:#4a3f33;}
  .card:active{transform:scale(.985);}
  .card.sel{border-color:var(--accent);background:var(--accent-weak);}
  .card .ic{font-family:var(--serif);font-size:1.25rem;color:var(--accent);width:30px;text-align:center;flex:none;}
  .card .cmid{flex:1;min-width:0;overflow:hidden;}
  .card .ct{font-weight:var(--fw-bold);font-size:var(--fs-lg);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .card .cd{color:var(--muted);font-size:var(--fs-sm);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pill{display:inline-flex;align-items:center;gap:4px;font-size:var(--fs-xs);padding:3px 9px;border-radius:var(--r-pill);
    border:1px solid var(--line);color:var(--muted-strong);margin-left:auto;flex:none;white-space:nowrap;}
  .pill.rdy{color:var(--good);border-color:var(--good-line);}
  .pill.uns{color:var(--accent);border-color:#5c4530;}
  .pill.due{color:var(--accent);border-color:#5c4530;background:var(--accent-weak);}
  .grouphd{font-size:var(--fs-sm);letter-spacing:.06em;color:var(--muted);margin:var(--sp-5) 0 var(--sp-3);display:flex;align-items:center;gap:var(--sp-2);}
  .grouphd b{font-weight:var(--fw-bold);color:var(--text);}
  .grouphd .cnt{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-pill);padding:1px 8px;font-size:var(--fs-xs);}
  /* デッキツリー（大 / 中 / 小 フォルダ。<details>で折りたたみ） */
  .cardgrid{display:flex;flex-direction:column;gap:var(--sp-3);}
  .fold{margin:0;}
  .fold>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:var(--sp-2);min-height:44px;padding:var(--sp-2);border-radius:var(--r-sm);}
  .fold>summary::-webkit-details-marker{display:none;}
  .fold>summary:hover{background:var(--surface);}
  .fold>summary .tw{width:0;height:0;border-left:6px solid var(--muted);border-top:4px solid transparent;border-bottom:4px solid transparent;transition:transform var(--t-fast);flex:none;}
  .fold[open]>summary .tw{transform:rotate(90deg);}
  .fold>summary .cnt{margin-left:auto;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-pill);padding:1px 8px;font-size:var(--fs-xs);color:var(--muted-strong);}
  .foldbody{padding:var(--sp-1) 0 var(--sp-1) var(--sp-3);margin-left:9px;border-left:1px solid var(--line);}
  .f1>summary b{font-size:var(--fs-lg);color:var(--text);}
  .f2>summary b{font-size:var(--fs-md);color:var(--text);}
  .f3>summary b{font-size:var(--fs-base);color:var(--muted-strong);font-weight:var(--fw-med);}
  .fold>summary .fold-act{display:inline-flex;gap:2px;margin-left:var(--sp-1);opacity:0;transition:opacity var(--t-fast);}
  .fold>summary:hover .fold-act,.fold>summary:focus-within .fold-act{opacity:1;}
  .ficon{background:none;border:none;color:var(--muted);cursor:pointer;min-width:34px;min-height:34px;border-radius:var(--r-sm);font-size:var(--fs-md);}
  .ficon:hover{background:rgba(255,255,255,.06);color:var(--text);}
  .statictext{font-family:var(--serif);font-size:1.0625rem;line-height:2;color:var(--text);overflow:auto;flex:1;padding:var(--sp-2) 0;}

  /* 検索・ソート */
  .lib-tools{display:flex;gap:var(--sp-2);margin-top:var(--sp-4);}
  .lib-tools .inp{flex:1;}
  .lib-tools select{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);color:var(--text);
    font-family:var(--sans);font-size:var(--fs-base);padding:0 var(--sp-3);min-height:44px;flex:none;}

  .inp{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);color:var(--text);
    font-family:var(--sans);font-size:var(--fs-md);padding:var(--sp-3) var(--sp-4);min-height:44px;}
  .inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-weak);}
  .catrow{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-2);margin-top:var(--sp-2);}
  .catrow .inp{font-size:var(--fs-base);padding:var(--sp-3);}

  /* ===== ボタン体系: 高さで統一し、横幅は役割（block / sm / icon）で決める。 ===== */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--sp-2);
    min-height:48px;padding:0 22px;border:none;border-radius:var(--r-md);
    font-family:var(--sans);font-size:var(--fs-lg);font-weight:var(--fw-bold);line-height:1;
    background:var(--accent);color:var(--on-accent);cursor:pointer;transition:background var(--t-fast),box-shadow var(--t-fast),transform var(--t-fast);
    box-shadow:var(--shadow-cta);}
  .btn:hover{background:var(--accent-600);}
  .btn:active{background:var(--accent-700);transform:translateY(1px);}
  .btn:disabled{opacity:.45;box-shadow:none;cursor:default;background:var(--accent);}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line);box-shadow:none;}
  .btn.ghost:hover{background:var(--surface);border-color:#4a3f33;}
  .btn.ghost:active{background:var(--surface);}
  .btn.block{display:flex;width:100%;margin-top:var(--sp-4);}
  .btn.block + .btn.block{margin-top:var(--sp-3);}
  .btn.sm{min-height:44px;font-size:var(--fs-md);padding:0 var(--sp-4);}
  .btn.icon{min-height:44px;width:44px;padding:0;font-size:1.125rem;}
  .btn.ghost.danger{color:var(--bad);border-color:var(--bad-line);}
  .btn.ghost.danger:hover{background:rgba(217,104,106,.08);}
  .box2 > .btn{margin-top:var(--sp-3);}

  .rowbtns{display:flex;gap:var(--sp-3);margin-top:var(--sp-4);align-items:stretch;}
  .rowbtns > .btn{flex:1;margin-top:0;}
  .rowbtns > .btn.icon{flex:0 0 44px;}

  textarea{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);color:var(--text);
    font-family:var(--sans);font-size:var(--fs-md);line-height:1.7;padding:var(--sp-4);resize:vertical;min-height:130px;}
  textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-weak);}

  .seg{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:var(--sp-1);gap:var(--sp-1);}
  .seg button{flex:1;border:none;background:none;color:var(--muted);font-family:var(--sans);font-weight:var(--fw-bold);
    font-size:var(--fs-base);min-height:44px;padding:0 var(--sp-2);border-radius:var(--r-sm);cursor:pointer;transition:background var(--t-fast),color var(--t-fast);}
  .seg button:hover{color:var(--text);background:rgba(255,255,255,.03);}
  .seg button.on{background:var(--accent);color:var(--on-accent);}
  .seg.dim{opacity:.5;pointer-events:none;}
  .chk{display:flex;align-items:center;gap:var(--sp-3);background:var(--surface);border:1px solid var(--line);
    border-radius:var(--r-md);padding:var(--sp-4);cursor:pointer;}
  .chk .box{width:22px;height:22px;border-radius:var(--r-sm);border:2px solid var(--line);flex:none;display:flex;
    align-items:center;justify-content:center;color:var(--on-accent);font-weight:var(--fw-bold);font-size:var(--fs-md);}
  .chk.on .box{background:var(--accent);border-color:var(--accent);}
  .chk .t{font-size:var(--fs-md);font-weight:var(--fw-bold);}
  .chk .d{font-size:var(--fs-sm);color:var(--muted);margin-top:2px;}

  .back{background:none;border:none;color:var(--muted);font-size:var(--fs-md);cursor:pointer;padding:var(--sp-1) 0;min-height:44px;display:flex;align-items:center;gap:6px;}
  .back:hover{color:var(--text);}
  .dtitle{font-family:var(--serif);font-weight:800;font-size:1.625rem;line-height:1.3;margin:var(--sp-3) 0 var(--sp-1);}
  .dtitle:focus{outline:none;}
  .meta{color:var(--muted);font-size:var(--fs-base);margin-bottom:var(--sp-4);}
  .box2{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:var(--sp-4);margin-bottom:var(--sp-3);box-shadow:var(--shadow-1);}
  .box2 .h{font-weight:var(--fw-bold);font-size:var(--fs-md);margin-bottom:var(--sp-1);}
  .box2 .p{color:var(--muted);font-size:var(--fs-base);line-height:1.6;}

  .banner{background:rgba(217,104,106,.12);border:1px solid var(--bad-line);color:#f0c9c9;border-radius:var(--r-md);
    padding:var(--sp-3) var(--sp-4);font-size:var(--fs-base);line-height:1.6;margin-bottom:var(--sp-3);}
  .banner.ok{background:rgba(111,185,143,.12);border-color:var(--good-line);color:#cfead9;}
  .banner .lnk{color:var(--accent);font-weight:var(--fw-bold);cursor:pointer;text-decoration:underline;}
  .loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--sp-5);text-align:center;}
  .spin{width:42px;height:42px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .loading .lt{font-weight:var(--fw-bold);}.loading .ld{color:var(--muted);font-size:var(--fs-base);}

  /* speed */
  .speedwrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:var(--sp-4);margin-top:var(--sp-3);box-shadow:var(--shadow-1);}
  .speedrow{display:flex;justify-content:space-between;align-items:baseline;}
  .speedrow span:first-child{font-weight:var(--fw-bold);}
  .speedrow span:last-child{color:var(--accent);font-family:var(--serif);font-weight:var(--fw-bold);}
  input[type=range]{width:100%;margin-top:var(--sp-3);-webkit-appearance:none;height:4px;border-radius:var(--r-pill);background:var(--line);}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--accent);box-shadow:0 2px 10px rgba(0,0,0,.4);}
  input[type=range]::-moz-range-thumb{width:28px;height:28px;border:none;border-radius:50%;background:var(--accent);}
  .ticks{display:flex;justify-content:space-between;color:var(--muted-strong);font-size:var(--fs-xs);margin-top:6px;}

  /* reader */
  .reader{flex:1;display:flex;flex-direction:column;}
  .rtop{display:flex;justify-content:space-between;align-items:center;gap:var(--sp-3);color:var(--muted);font-size:var(--fs-base);}
  .rtop > span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
  .xbtn{background:none;border:none;color:var(--muted);font-size:1.375rem;cursor:pointer;flex:none;min-width:44px;min-height:44px;}
  .xbtn:hover{color:var(--text);}
  .progress{height:4px;background:var(--line);border-radius:var(--r-pill);margin-top:var(--sp-3);overflow:hidden;}
  .progress > i{display:block;height:100%;width:0;background:var(--accent);transition:width var(--t-fast) linear;}
  .stage{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;cursor:pointer;min-height:36vh;overflow:hidden;}
  /* 塊全体を常に中央表示（焦点固定はやめ、ブロック中心＝画面中央で固定。脳のノイズになる左右ブレを排除）。
     焦点はオレンジ色のハイライトのみ。長い塊は fitFlash が font-size を縮めて必ず収める。 */
  .flash{font-family:var(--serif);font-weight:800;font-size:var(--flash-fs);line-height:1.25;
    white-space:nowrap;text-align:center;transition:opacity var(--t-fast);}
  .flash .focus{color:var(--accent);}
  .flash.countdown{animation:pop .6s ease;}
  .stage.paused .flash{opacity:.42;}
  .guide{display:none;}   /* 焦点固定をやめたため視線ガイドは非表示 */
  .pausedovl{position:absolute;left:50%;top:calc(50% + 1.8em);transform:translateX(-50%);color:var(--muted-strong);
    font-size:var(--fs-base);white-space:nowrap;display:none;}
  .stage.paused .pausedovl{display:block;}
  .countdown{font-family:var(--serif);font-size:5.5rem;color:var(--accent);animation:pop .9s ease;}
  @keyframes pop{from{opacity:0;transform:scale(.5);}to{opacity:1;transform:scale(1);}}
  .seekwrap{margin-top:var(--sp-4);}
  .seekwrap .pos{color:var(--muted-strong);font-size:var(--fs-sm);text-align:center;margin-top:7px;}
  .rctrl{display:flex;gap:var(--sp-3);margin-top:var(--sp-4);}
  .rctrl button{flex:1;min-height:48px;border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:var(--r-md);
    padding:0 var(--sp-3);font-size:var(--fs-lg);font-weight:var(--fw-bold);font-family:var(--sans);cursor:pointer;transition:background var(--t-fast);}
  .rctrl button:hover{background:#2c251d;}
  .rctrl button.main{background:var(--accent);color:var(--on-accent);border-color:var(--accent);}
  .rctrl button.main:hover{background:var(--accent-600);}
  .hint{text-align:center;color:var(--muted-strong);font-size:var(--fs-sm);margin-top:var(--sp-4);line-height:1.6;}

  /* quiz */
  .qhead{font-family:var(--serif);font-weight:var(--fw-bold);font-size:1.375rem;margin:var(--sp-1) 0 2px;}
  .qcount{color:var(--muted);font-size:var(--fs-base);margin-bottom:var(--sp-2);}
  .qprog{height:4px;background:var(--line);border-radius:var(--r-pill);overflow:hidden;margin-bottom:var(--sp-5);}
  .qprog > i{display:block;height:100%;background:var(--accent);transition:width var(--t-base);}
  .question{font-size:var(--fs-xl);font-weight:var(--fw-bold);line-height:1.6;margin-bottom:var(--sp-5);}
  .opt{display:flex;align-items:center;gap:var(--sp-3);width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);
    padding:var(--sp-4);margin-bottom:var(--sp-3);color:var(--text);font-family:var(--sans);font-size:var(--fs-lg);line-height:1.5;cursor:pointer;transition:border-color var(--t-fast),background var(--t-fast);}
  .opt:hover{border-color:#4a3f33;}
  .opt:active{transform:scale(.99);}
  .opt .mk{flex:none;width:1.4em;font-weight:var(--fw-bold);}
  .opt.correct{border-color:var(--good);background:rgba(111,185,143,.12);}
  .opt.correct .mk{color:var(--good);}
  .opt.wrong{border-color:var(--bad);background:rgba(217,104,106,.12);}
  .opt.wrong .mk{color:var(--bad);}
  .opt.dim{opacity:.5;}
  .opt[aria-disabled=true]{cursor:default;}
  .feed{margin-top:var(--sp-2);padding:var(--sp-4);border-radius:var(--r-md);font-size:var(--fs-md);line-height:1.7;background:var(--bg2);border:1px solid var(--line);color:var(--text);}
  .feed b{color:var(--text);}
  .feed .src{margin-top:var(--sp-2);color:var(--muted);font-size:var(--fs-base);border-left:2px solid var(--accent-weak);padding-left:var(--sp-3);}

  /* クイズ生成レビュー（Step4 信頼ガード） */
  .rv-summary{font-weight:var(--fw-bold);font-size:var(--fs-md);margin:var(--sp-2) 0 var(--sp-3);color:var(--text);}

<div id="app">

<script>
// ====== LLM access ======
// 全モデル呼び出しは provider 非依存の callLLM(prompt,opts) に集約する（CLAUDE.md / spec §8 準拠）。
// BYOK（持ち込みキー）対応:
//   ・⚙設定で provider と APIキーを登録すると、その provider に直接アクセスする。
//   ・キー未設定 かつ Anthropic のときだけ、従来どおりアーティファクトのキーレス代理にフォールバック。
//   ・キーは settings.keys に保持し localStorage に保存（端末内のみ・ログ/コミットはしない）。
// 能力優先で令和8年(2026)6月時点の最上位を既定に。モデルIDは各社更新が速いので要再確認。
const PROVIDER_MODEL = {
  anthropic: "claude-opus-4-8",   // 弾かれたら claude-sonnet-4-6 に自動降格
  openai:    "gpt-5.5",
  google:    "gemini-3.1-pro-preview"
};
const ANTHROPIC_FALLBACK = "claude-sonnet-4-6";
const PROVIDER_LABEL = { anthropic:"Anthropic", openai:"OpenAI", google:"Google" };

// 生成の中断（ユーザの「中断」ボタン）用。各リクエストは60秒のタイムアウトも併設。
let genAbort=null;
function abortSignals(){
  const sigs=[];
  if(genAbort) sigs.push(genAbort.signal);
  try{ sigs.push(AbortSignal.timeout(60000)); }catch(_){}
  try{ return sigs.length>1 ? AbortSignal.any(sigs) : sigs[0]; }catch(_){ return sigs[0]; }
}
// fetch 共通: 通信失敗・非200・空応答・中断・タイムアウトを分かりやすいエラーに正規化。
async function postJSON(url, headers, body){
  let res;
  try{ res = await fetch(url,{method:"POST",headers,body:JSON.stringify(body),signal:abortSignals()}); }
  catch(e){
    if(e&&(e.name==='AbortError'||e.name==='TimeoutError')){
      const a=new Error(genAbort&&genAbort.signal.aborted?'中断しました':'時間切れになりました。通信環境をご確認ください'); a.code='abort'; throw a;
    }
    throw new Error("通信に失敗: "+e.message);
  }
  const txt = await res.text();
  if(!res.ok){
    const e=new Error("API "+res.status+" / "+txt.slice(0,160));
    if((res.status===404||res.status===400)&&/model/i.test(txt)) e.code="model";  // モデル名拒否→降格対象
    if(res.status===401||res.status===403) e.code="auth";                          // キー不正/権限不足
    throw e;
  }
  try{ return JSON.parse(txt); }catch(e){ throw new Error("応答がJSONではない / "+txt.slice(0,160)); }
}
// e.code 別に分かりやすい日本語へ（IT非専門ユーザ向け。生例外は詳細に折りたたみ）
function friendlyErr(e){
  const code=e&&e.code, msg=String((e&&e.message)||e||'');
  if(code==='abort') return msg;
  if(code==='auth') return 'APIキーが正しくないようです。⚙設定でキーを確認してください。';
  if(code==='model') return 'モデルを利用できませんでした。⚙設定のプロバイダ/モデルをご確認ください。';
  if(/通信に失敗|Failed to fetch|NetworkError/.test(msg)) return 'ネットに接続できませんでした。通信環境をご確認ください。';
  if(/JSON/.test(msg)) return 'AIの応答を読み取れませんでした。もう一度お試しください。';
  return msg.slice(0,120);
}
// --- Anthropic（key 無し=アーティファクトのキーレス代理 / key 有り=BYOK直叩き） ---
async function callAnthropic(key, model, prompt, maxTokens){
  const headers={"Content-Type":"application/json"};
  if(key){ headers["x-api-key"]=key; headers["anthropic-version"]="2023-06-01"; headers["anthropic-dangerous-direct-browser-access"]="true"; }
  const data=await postJSON("https://api.anthropic.com/v1/messages", headers,
    {model, max_tokens:maxTokens, messages:[{role:"user",content:prompt}]});
  if(data&&data.error) throw new Error("APIエラー: "+((data.error.message)||JSON.stringify(data.error)).slice(0,160));
  const out=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
  if(!out) throw new Error("空応答");
  return out;
}
// --- OpenAI（BYOK必須） ---
async function callOpenAI(key, model, prompt, maxTokens){
  const data=await postJSON("https://api.openai.com/v1/chat/completions",
    {"Content-Type":"application/json","Authorization":"Bearer "+key},
    {model, max_completion_tokens:maxTokens, messages:[{role:"user",content:prompt}]});
  const out=((((data.choices||[])[0]||{}).message||{}).content||"").trim();
  if(!out) throw new Error("空応答");
  return out;
}
// --- Google Gemini（BYOK必須・キーはクエリパラメータ） ---
async function callGoogle(key, model, prompt, maxTokens){
  const data=await postJSON(
    "https://generativelanguage.googleapis.com/v1beta/models/"+encodeURIComponent(model)+":generateContent?key="+encodeURIComponent(key),
    {"Content-Type":"application/json"},
    {contents:[{parts:[{text:prompt}]}], generationConfig:{maxOutputTokens:maxTokens}});
  const parts=((((data.candidates||[])[0]||{}).content||{}).parts)||[];
  const out=parts.map(p=>p.text||"").join("").trim();
  if(!out) throw new Error("空応答");
  return out;
}
// provider 非依存の単一窓口。genQuiz/reconstruct/categorize はこれだけを呼ぶ。
async function callLLM(prompt,opts={}){
  const maxTokens=opts.maxTokens||8192;
  const prov=(settings.provider)||"anthropic";
  const key=((settings.keys&&settings.keys[prov])||"").trim();
  const model=PROVIDER_MODEL[prov]||PROVIDER_MODEL.anthropic;
  if(prov==="anthropic"){
    try{ return await callAnthropic(key, model, prompt, maxTokens); }   // key有=BYOK / key無=キーレス代理
    catch(e){
      if(e&&e.code==="model"&&ANTHROPIC_FALLBACK!==model) return await callAnthropic(key, ANTHROPIC_FALLBACK, prompt, maxTokens);
      throw e;
    }
  }
  if(!key) throw new Error(PROVIDER_LABEL[prov]+" のAPIキーが未設定です。⚙設定でキーを入力してください。");
  if(prov==="openai") return await callOpenAI(key, model, prompt, maxTokens);
  if(prov==="google") return await callGoogle(key, model, prompt, maxTokens);
  throw new Error("未知のプロバイダ: "+prov);
}
function stripFences(t){return t.replace(/^```(?:json)?/i,"").replace(/```$/,"").trim();}
// クイズ配列を背骨スキーマに正規化（AI生成/JSON貼付/ファイル取込の全経路で共用）。
// ・空/重複の選択肢を除去（無意味な選択肢を作らない）
// ・正解は「正解の本文」基準で再特定。dedup でズレても正しく追従し、特定不能なら問題ごと drop
//   （黙って a=0 にして“もっともらしい誤クイズ”を量産しない＝最大リスクへの対応）
// ・背骨は4択固定のため、足りなければ末尾を空で補う（空はクイズ画面で選べない体裁ダミー）
function normalizeQuiz(arr){
  if(!Array.isArray(arr))return[];
  const out=[];
  for(const x of arr){
    if(!x||typeof x!=='object'||!x.q||!Array.isArray(x.o))continue;
    const ai=Number(x.a);
    const aText=(Number.isInteger(ai)&&x.o[ai]!=null)?String(x.o[ai]).trim():null; // 正解本文を退避
    const seen=new Set(); const o=[];
    for(const v of x.o){ const s=String(v==null?'':v).trim(); if(!s||seen.has(s))continue; seen.add(s); o.push(s); }
    if(o.length<2) continue;                        // 実質的な選択肢が2未満 → 不採用
    const a = aText!=null ? o.indexOf(aText) : -1;  // 正解の位置を本文で再特定
    if(a<0 || a>3) continue;                         // 正解不明 → 不採用（でっち上げない）
    while(o.length<4) o.push('');
    // src（本文根拠スニペット）はメモリ内のみ保持。toDeckJSON では剥がす（背骨9フィールド契約外）。
    out.push({q:String(x.q), o:o.slice(0,4), a, e:String(x.e||''), src:String(x.src||'')});
  }
  return out;
}
// デッキを背骨スキーマに正規化（メモリ内はicon/desc等の表示用フィールドを保持してよい）。
function normalizeDeck(raw){
  const d=(raw&&typeof raw==='object'&&!Array.isArray(raw))?raw:{};
  const quiz=normalizeQuiz(d.quiz);
  return Object.assign({},d,{
    id:d.id||uid(),
    title:String(d.title||''),
    source:String(d.source||''),
    flashMode:d.flashMode==='ai'?'ai':'original',
    flashText:String(d.flashText||''),
    quiz, quizStatus:quiz.length?'ready':'unset',
    category:String(d.category||''),
    createdAt:d.createdAt||new Date().toISOString()
  });
}
// 書き出し用：正準9フィールドだけを emit（icon/desc/src 等の派生・補助値は混入させない）。
function toDeckJSON(d){
  // quiz は {q,o,a,e} の4フィールドのみ。src（本文根拠）はエクスポートに含めない。
  const quiz=normalizeQuiz(d.quiz).map(q=>({q:q.q, o:q.o, a:q.a, e:q.e}));
  return {
    id:d.id||uid(), title:String(d.title||''), source:String(d.source||''),
    flashMode:d.flashMode==='ai'?'ai':'original', flashText:String(d.flashText||''),
    quiz, quizStatus:quiz.length?'ready':'unset',
    category:String(d.category||''), createdAt:d.createdAt||new Date().toISOString()
  };
}
// 出力が途中で切れても、完成した {...} だけを救出する堅牢パーサ
// 出力が途中で切れても、完成した {...} だけを救出する汎用パーサ（オブジェクト配列を返す）。
function parseJsonObjects(raw){
  raw=stripFences(raw);
  const objs=[];let depth=0,start=-1,inStr=false,esc2=false;
  for(let k=0;k<raw.length;k++){const ch=raw[k];
    if(inStr){if(esc2)esc2=false;else if(ch==='\\')esc2=true;else if(ch==='"')inStr=false;continue;}
    if(ch==='"'){inStr=true;continue;}
    if(ch==='{'){if(depth===0)start=k;depth++;}
    else if(ch==='}'){depth--;if(depth===0&&start>=0){objs.push(raw.slice(start,k+1));start=-1;}}}
  const parsed=[];
  for(const o of objs){try{parsed.push(JSON.parse(o));}catch(_){}}
  return parsed;
}
function parseQuizLoose(raw){ return normalizeQuiz(parseJsonObjects(raw)); }

// 信憑性テスト(docs/QUIZ_CREDIBILITY_TEST.md §3)を反映した強化版プロンプト。
// 本文外参照の明示禁止 / 一意性・相互排他を独立条項化 / 数値取り違え厳禁 / 各問に本文根拠 src を必須化。
async function genQuiz(text){
  const prompt =
`あなたは資格試験の問題作成者です。【本文】の記述だけを根拠に4択問題を作ります。

# 厳守ルール（破ったら出題しない）
1. 本文外参照の禁止: 本文に書かれていない事実・一般常識・あなたの知識を一切使わない。本文に根拠が無い論点は出題しない（無理に問題数を埋めない）。
2. 一意性: 正解は本文上ただ1つに定まること。本文だけで答えが2つ以上取れる問題は作らない。
3. 選択肢の相互排他: 4つの選択肢は互いに両立しない。誤りの3つは「本文に照らすと明確に誤り」であること。本文上も正しい・部分的に正しい選択肢を誤りに混ぜない。
4. 数値・固有名詞: 本文の値を一字一句そのまま使う。近い数値を誤選択肢に置くときも、正解の値は本文と完全一致させる（取り違え厳禁）。
5. 各問に "src"（本文根拠スニペット）を必須で付ける: 正解の根拠になる本文の一節を改変せず10〜60字そのまま抜き出す。抜き出せない＝本文に根拠が無い問題は作らない。
6. 解説 "e" は40字以内。正解が本文のどこに基づくかを簡潔に。

# 出力（JSON配列のみ。前後の説明・マークダウン・コードフェンス禁止）
[{"q":"問題文","o":["選択肢1","選択肢2","選択肢3","選択肢4"],"a":正解番号(0始まり),"e":"短い解説","src":"本文からの根拠抜粋"}]

# 問題数
本文量に応じて適切に（目安: 200〜300字あたり1問、重要論点を網羅）。質を量より優先する。

【本文】
"""${text}"""`;
  const arr = parseQuizLoose(await callLLM(prompt,{maxTokens:8192}));
  if(!arr.length) throw new Error("問題を取り出せませんでした");
  return arr;
}
// Step4 自己検証（docs/QUIZ_CREDIBILITY_TEST.md §4）: callLLM バッチ1回で各問を本文のみ基準に判定。
// 戻り: items と同順・同数の [{ok,unique,wrongClear,grounded,reason}]。失敗時は全 ok=true 扱い（過剰除外を避ける）。
async function verifyQuiz(items, source){
  const passAll = items.map(()=>({ok:true,unique:true,wrongClear:true,grounded:true,reason:''}));
  if(!items.length) return [];
  const payload = items.map((x,i)=>({i, q:x.q, o:x.o, a:x.a, e:x.e, src:x.src||''}));
  const prompt =
`あなたはクイズの校閲者です。【本文】だけを唯一の根拠として各設問を検査します。あなた自身の知識・一般常識は使わない（本文に書いていなければ「判断不能」とみなし不合格）。

各設問について次の3点を判定:
- unique: 本文だけを根拠に、正解(aが指す選択肢)が唯一の正解として定まるか（他の選択肢も正しい/正解が2つ取れるなら false）
- wrongClear: 正解以外の3つすべてが本文に照らして「明確に誤り」か（1つでも本文上正しい・部分的に正しい・判断不能なら false）
- grounded: 設問・正解・解説のすべてが本文の記述に基づくか（本文外の事実を含まないか）

判定ルール:
- unique・wrongClear・grounded すべて true のときだけ ok=true。1つでも false なら ok=false。
- 数値・固有名詞は本文と完全一致か確認（近い別数値が正解に化けていないか）。
- reason は20字以内で簡潔に。

出力（JSON配列のみ。前後の説明・マークダウン禁止。入力と同じ順序・同じ件数）:

// ====== 複数デッキ計画（長文を大/中/小フォルダ付きの複数デッキに分割） ======

async function planDecks(src, splitMode){
  const guide = splitMode==='merge' ? 'できるだけ少なく、大きくまとめる（目安1〜3個）'
              : splitMode==='split' ? '小さな単元ごとに細かく分ける（多めでよい。最大12個）'
              : '内容の構造に応じて適切な数に分ける（最大12個）';
  const prompt =
`次の学習用テキストを、フラッシュ学習の教材に分割する計画を立ててください。
方針: ${guide}。
各教材について階層フォルダ（大項目・中項目・小項目）と、本文中でその教材が始まる箇所を示す「開始マーカー」を返します。
・開始マーカーは本文から一字一句そのまま抜き出した10〜30字の連続文字列（見出しや最初の文）。改変・要約は禁止。
・最初の教材の開始マーカーは本文の冒頭にする。教材は本文の登場順に並べる。最大12個。
出力はJSON配列のみ（前後の説明・マークダウン禁止）:
[{"title":"短い教材名","big":"大項目","mid":"中項目","small":"小項目","start":"開始マーカー"}]
本文:
"""${src}"""`;
  const arr = parseJsonObjects(await callLLM(prompt,{maxTokens:4096}));
  return arr.filter(p=>p&&typeof p==='object').slice(0,12);
}
// 計画(開始マーカー)に従って原文を区切り、各デッキの本文を割り当てる。
function buildSections(src, plans){
  const marks=[];
  plans.forEach((p,i)=>{
    let at = i===0 ? 0 : src.indexOf(String(p.start||'').trim());
    marks.push({p, at: (String(p.start||'').trim() && at>=0)||i===0 ? at : null});
  });
  const bnds=marks.filter(m=>m.at!=null).sort((a,b)=>a.at-b.at);
  if(!bnds.length) return [{p:plans[0]||{}, text:src}];   // 全滅→単一デッキ
  bnds[0].at=0;
  const out=[];
  for(let i=0;i<bnds.length;i++){
    const start=bnds[i].at, end=(i+1<bnds.length)?bnds[i+1].at:src.length;
    const text=src.slice(start,end).trim();
    if(text) out.push({p:bnds[i].p, text});
  }
  return out;
}

    bg.innerHTML=`<div class="modal" role="dialog" aria-modal="true" aria-labelledby="mttl">
      <div class="mt" id="mttl"></div><div class="mp" id="mbody"></div>
      <div class="row"><button class="btn ghost" id="mcancel"></button><button class="btn" id="mok"></button></div></div>`;
    bg.querySelector('#mttl').textContent=o.title||'';
    const mb=bg.querySelector('#mbody'); if(o.body){ mb.textContent=o.body; } else { mb.style.display='none'; }
    bg.querySelector('#mcancel').textContent=o.cancel||'キャンセル';
    const ok=bg.querySelector('#mok'); ok.textContent=o.confirm||'OK'; if(o.danger) ok.classList.add('ghost','danger');
    document.body.appendChild(bg);
    const done=v=>{ bg.remove(); document.removeEventListener('keydown',onk); try{prev&&prev.focus&&prev.focus();}catch(_){}; resolve(v); };
    const onk=e=>{ if(e.key==='Escape'){e.preventDefault();done(false);} };
    document.addEventListener('keydown',onk);
    bg.addEventListener('click',e=>{ if(e.target===bg) done(false); });
    bg.querySelector('#mcancel').onclick=()=>done(false);
    ok.onclick=()=>done(true);
    (o.danger?bg.querySelector('#mcancel'):ok).focus();
  });
}

// ====== chunker ======
// 文節チャンク＋文の開始インデックスを返す（長文での文単位ナビゲーション用）。
function buildChunks(text){
  const MIN=2, TARGET=6, MAX=12, HARDCAP=18, WHOLE=9;
  // 文字種で区切る方式: 漢字熟語・カタカナ語・数値(単位含む)を塊として保ち、
  // 「種が変わる位置」を語境界とみなす（助詞文字での誤切＝「よこはま」を「は」で割る等を防ぐ）。
  const T_OTHER=0,T_KANJI=1,T_HIRA=2,T_KATA=3,T_NUM=4,T_PUNCT=5;
  const reKanji=/[一-鿿々〆]/, reHira=/[ぁ-ゟ]/, reKata=/[ァ-ヿ]/,
        reNum=/[0-9０-９A-Za-zＡ-Ｚａ-ｚ]/, rePunct=/[、，。．！？；：）)\]｝」』】》〉]/;
  function ctype(ch){
    if(!ch) return T_OTHER;
    if(rePunct.test(ch)) return T_PUNCT;
    if(reHira.test(ch))  return T_HIRA;
    if(reKata.test(ch))  return T_KATA;
    if(reNum.test(ch))   return T_NUM;
    if(reKanji.test(ch)) return T_KANJI;
    return T_OTHER;
  }
  // 数の途中を割らないための「数値部品」: 数字・英字・小数点/桁区切り・単位・接頭。
  const reNumPart=/[0-9０-９A-Za-zＡ-Ｚａ-ｚ.,，．・万億兆千百十%％円人件年度月日割期号第約％]/;
  const numPart=ch=>!!ch&&reNumPart.test(ch);
  // s[j-1] と s[j] の間が「安全に切れる」境界か
  function safe(s,j){
    if(j<=0||j>=s.length) return false;
    const a=s[j-1], b=s[j];
    if(numPart(a)&&numPart(b)) return false;        // 数値の途中は不可（94万3,400人 / 第9期 等）
    const ta=ctype(a), tb=ctype(b);
    if(ta===T_PUNCT) return true;                   // 句読点の直後は常に可
    if(tb===T_PUNCT) return false;                  // 句読点を次の塊の先頭にしない
    if(ta===tb) return false;                       // 同種連続の内部は不可（熟語/カナ語/数を割らない）
    if(ta===T_KANJI && tb===T_HIRA) return false;   // 漢字→ひらがなは送り仮名の途中になりやすい
    return true;                                    // それ以外の種の変わり目は概ね語境界
  }
  const sents=String(text||'').match(/[^。！？\n]+[。！？]?/g)||[];
  const raw=[], rawSentStart=[];
  for(let s of sents){ s=s.trim(); if(!s)continue;
    rawSentStart.push(raw.length); let i=0;
    while(i<s.length){
      if(s.length-i<=WHOLE){ raw.push(s.slice(i)); break; }   // 残りが短ければ一気に
      // [i+MIN, i+MAX] で TARGET に最も近い安全境界を採用
      let cut=-1, bestDist=1e9;
      const lo=i+MIN, hi=Math.min(i+MAX, s.length-1);
      for(let j=lo;j<=hi;j++){
        if(safe(s,j)){ const d=Math.abs((j-i)-TARGET); if(d<=bestDist){bestDist=d; cut=j;} }
      }
      if(cut<0){ // 範囲内に境界なし（長い熟語/カナ語）→ HARDCAP まで延ばして最初の境界、無ければ強制
        const hi2=Math.min(i+HARDCAP, s.length-1);
        for(let j=i+MAX;j<=hi2;j++){ if(safe(s,j)){cut=j;break;} }
        if(cut<0) cut=Math.min(i+MAX, s.length);
      }
      raw.push(s.slice(i,cut)); i=cut;
    }
  }
  // 後処理: 実質1文字以下の断片（「が、」「。」等）は前の語にくっつける。
  const out=[], map=[];
  for(let k=0;k<raw.length;k++){
    const c=raw[k], core=c.replace(/[、。！？，．；：・\s]/g,'');
    if(out.length && core.length<=1){ out[out.length-1]+=c; map[k]=out.length-1; }
    else { map[k]=out.length; out.push(c); }
  }
  const sentStarts=[...new Set(rawSentStart.map(i=>map[i]??0))];
  return { chunks:out, sentStarts: sentStarts.length?sentStarts:[0] };
}
// 互換ラッパ（チャンク文字列だけ欲しい場合）
function chunkText(text){ return buildChunks(text).chunks; }
// 表示時間: 認知律速（漢字は重く、数字/英字はやや重く）＋句末で保持＋停留に床220ms。
function delayFor(c){
  c=String(c||''); let units=0;
  for(const ch of c){
    if(/[一-鿿々〆]/.test(ch)) units+=1.5;
    else if(/[0-9０-９A-Za-z]/.test(ch)) units+=1.2;
    else units+=1;
  }
  const base=540-(speed-1)*44;
  let d=base+units*34;
  if(/[。！？]$/.test(c)) d+=280; else if(/[、，]$/.test(c)) d+=130;
  return Math.max(220, d);
}
// ORP焦点位置: 短いチャンクは先頭寄り、長いほど中央寄りに（固視点をなるべく安定させる）。
function focusIndex(len){ if(len<=1)return 0; if(len<=4)return 1; return Math.min(len-1, Math.round(len*0.3)); }
// pre/focus/post の3部構成。.flash のグリッドが focus を常に画面水平中央へ固定する。
function renderFlash(c){
  c=String(c||'');
  if(!c.length) return '<span class="pre"></span><span class="focus"></span><span class="post"></span>';
  const m=focusIndex(c.length);
  return `<span class="pre">${esc(c.slice(0,m))}</span><span class="focus">${esc(c[m])}</span><span class="post">${esc(c.slice(m+1))}</span>`;
}
function uid(){return"d"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function esc(s){return(s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}

// ====== category path utils（大 / 中 / 小） ======
function catParts(cat){ return String(cat||'').split('/').map(s=>s.trim()).filter(Boolean); }
function catLevel(cat,n){ return catParts(cat)[n]||''; }            // 0=大,1=中,2=小
function joinCat(a,b,c){ return [a,b,c].map(s=>String(s||'').trim()).filter(Boolean).join(' / '); }

// ====== LIBRARY ======
let libQuery='', libSort='recent';
let closedFolders=new Set();   // 既定は全開。ユーザが閉じたフォルダだけ記録（再訪でも保持）
// 経過日数の人にやさしい表記
function agoLabel(iso){ if(!iso)return''; const d=Math.floor((Date.now()-new Date(iso).getTime())/86400000);
  return d<=0?'今日':d===1?'昨日':d<7?d+'日前':d<30?Math.floor(d/7)+'週間前':Math.floor(d/30)+'ヶ月前'; }
// 学習状態を表す pill（進捗レイヤを参照）
function pillFor(d){
  if(d.quizStatus!=='ready') return `<span class="pill uns">問題なし</span>`;
  const p=getProg(d.id);
  if(p&&p.attempts){
    if(isDue(d.id)) return `<span class="pill due"><span aria-hidden="true">↻</span>復習</span>`;
    return `<span class="pill rdy"><span aria-hidden="true">✓</span>${p.lastScore}/${p.total}</span>`;
  }
  return `<span class="pill uns">${d.quiz.length}問</span>`;
}
function cardHtml(d){
  const ic=d.icon||catLevel(d.category,0)[0]||'新';
  const p=getProg(d.id);
  const bits=[(d.flashMode==='ai'?'AI再構成':'原文'),'約'+d.flashText.length+'字'];
  if(p&&p.lastStudiedAt) bits.push(agoLabel(p.lastStudiedAt));
  return `
  <button class="card" data-id="${d.id}">
    <span class="ic" aria-hidden="true">${esc(ic)}</span>
    <span class="cmid"><span class="ct">${esc(d.title)||"(無題)"}</span><span class="cd">${esc(bits.join(' · '))}</span></span>
    ${pillFor(d)}
  </button>`;}
function cardsWrap(list){ return `<div class="cardgrid">${list.map(cardHtml).join('')}</div>`; }
// 検索＋ソート適用後の表示対象
function visibleDecks(){
  const q=libQuery.trim().toLowerCase();
  let list=decks.filter(d=>!q || (d.title+' '+d.category+' '+d.source).toLowerCase().includes(q));
  const t=d=>{ const p=getProg(d.id); return p&&p.lastStudiedAt?new Date(p.lastStudiedAt).getTime():0; };
  const due=d=>{ const p=getProg(d.id); return p&&p.due?new Date(p.due).getTime():Infinity; };
  if(libSort==='recent') list=list.slice().sort((a,b)=>t(b)-t(a));
  else if(libSort==='due') list=list.slice().sort((a,b)=>due(a)-due(b));
  else if(libSort==='name') list=list.slice().sort((a,b)=>String(a.title).localeCompare(String(b.title),'ja'));
  return list;
}
// 大>中>小の入れ子ツリー。中/小が空のデッキはその階層の直下に並ぶ。
function buildTree(list){
  const root=new Map();
  list.forEach(d=>{
    const p=catParts(d.category), L1=p[0]||'未分類', L2=p[1]||'', L3=p[2]||'';
    if(!root.has(L1)) root.set(L1,new Map());
    const mids=root.get(L1), mk=L2||'__none__';
    if(!mids.has(mk)) mids.set(mk,{label:L2,subs:new Map()});
    const subs=mids.get(mk).subs, sk=L3||'__none__';
    if(!subs.has(sk)) subs.set(sk,{label:L3,decks:[]});
    subs.get(sk).decks.push(d);
  });
  return root;
}
// フォルダ見出し: 開閉(open-state保持) ＋ 改名/削除ボタン。data-path にパスを持たせる。
function fold(cls,label,count,path,inner){
  const open = closedFolders.has(path) ? '' : ' open';
  return `<details class="fold ${cls}"${open} data-path="${esc(path)}">
    <summary><span class="tw" aria-hidden="true"></span><b>${esc(label)}</b><span class="cnt">${count}</span>
    <span class="fold-act">
      <button class="ficon" data-act="rename" data-path="${esc(path)}" aria-label="フォルダ名を変更"><span aria-hidden="true">✎</span></button>
      <button class="ficon" data-act="del" data-path="${esc(path)}" aria-label="このフォルダをまとめて削除"><span aria-hidden="true">🗑</span></button>
    </span></summary><div class="foldbody">${inner}</div></details>`;
}
function renderTree(){
  const list=visibleDecks();
  // 初回のみ全フォルダ open をシード（以後はユーザ操作を openFolders で保持）
  const root=buildTree(list);
  let body='';
  for(const [L1,mids] of root){
    let c1=0, inner='';
    for(const [,m] of mids) for(const [,s] of m.subs) c1+=s.decks.length;
    for(const [mk,m] of mids){
      let c2=0; for(const [,s] of m.subs) c2+=s.decks.length;
      let subsHtml='';
      for(const [sk,s] of m.subs){
        subsHtml += s.label ? fold('f3',s.label,s.decks.length, L1+' / '+m.label+' / '+s.label, cardsWrap(s.decks)) : cardsWrap(s.decks);
      }
      inner += m.label ? fold('f2',m.label,c2, L1+' / '+m.label, subsHtml) : subsHtml;
    }
    body += fold('f1',L1,c1,L1,inner);
  }
  return body || `<div class="meta" style="margin-top:16px;">${libQuery?'該当する教材がありません。':'教材がありません。「＋ 教材から新規」または「⤓ 読み込む」で追加してください。'}</div>`;
}
// パス（"大 / 中"）配下の教材
function decksUnderFolder(parts){
  return decks.filter(d=>{ const p=catParts(d.category); return parts.every((seg,i)=>p[i]===seg); });
}
function summaryBar(){
  const due=dueCount(), st=streakDays(), acc=recentAccuracy();
  return `<div class="sumbar">
    <div class="stat"><b>${due}</b><span>今日の復習</span></div>
    <div class="stat"><b>${st}</b><span>連続日数</span></div>
    <div class="stat"><b>${acc==null?'—':acc+'%'}</b><span>直近正答率</span></div>
    ${due?`<button class="btn sm" id="dorev">復習する</button>`:''}
  </div>`;
}

// ツリーだけ再描画（検索/ソート時。フォーカスを奪わない）
function refreshTree(){ const c=document.getElementById('cards'); if(c){ c.innerHTML=renderTree(); wireTree(); } }
function wireTree(){
  const c=document.getElementById('cards'); if(!c)return;
  // カードクリック → 教材を開く
  c.onclick=e=>{
    const fb=e.target.closest('.ficon');
    if(fb){ e.preventDefault(); e.stopPropagation(); folderAction(fb.dataset.act, fb.dataset.path); return; }
    const b=e.target.closest('.card'); if(!b)return;
    cur=decks.find(d=>d.id===b.dataset.id); if(cur) deckDetail();
  };
  // 開閉状態を openFolders に保持（toggleはバブルしないので各detailsに付与）
  c.querySelectorAll('details.fold').forEach(d=>{
    d.ontoggle=()=>{ const p=d.dataset.path; if(d.open)closedFolders.delete(p); else closedFolders.add(p); };
  });
}
function startReview(){
  const dueDecks=decks.filter(d=>d.quizStatus==='ready'&&isDue(d.id));
  if(!dueDecks.length){ showToast('今日の復習はありません'); return; }
  cur=dueDecks[0]; startQuiz();
}
async function folderAction(act, path){
  const parts=catParts(path);
  const targets=decksUnderFolder(parts);
  if(!targets.length) return;
  if(act==='del'){
    const ok=await showModal({title:`「${parts.join(' / ')}」を削除`,
      body:`このフォルダの教材 ${targets.length}件 をまとめて削除します。\nこの操作は取り消せます（数秒間）。`,
      confirm:'削除する', danger:true});
    if(ok) removeDecks(targets.map(d=>d.id), parts.join(' / '));
  } else if(act==='rename'){
    const lvl=parts.length-1;
    const nv=await showPrompt(`「${parts[lvl]}」の名前を変更`, parts[lvl]);
    if(nv==null) return;
    const nm=nv.trim(); if(!nm||nm===parts[lvl]) return;
    targets.forEach(d=>{ const p=catParts(d.category); p[lvl]=nm; d.category=joinCat(p[0],p[1],p[2]); });
    saveDecks(); library(); showToast('フォルダ名を変更しました');
  }
}
// 入力付きモーダル。Promise<string|null>
function showPrompt(title, value){
  return new Promise(resolve=>{
    const prev=document.activeElement;
    const bg=document.createElement('div'); bg.className='modal-bg';
    bg.innerHTML=`<div class="modal" role="dialog" aria-modal="true" aria-labelledby="pttl">
      <div class="mt" id="pttl"></div>
      <input class="inp" id="pinp" style="margin-bottom:var(--sp-4)">
      <div class="row"><button class="btn ghost" id="pcancel">キャンセル</button><button class="btn" id="pok">変更</button></div></div>`;
    bg.querySelector('#pttl').textContent=title; const inp=bg.querySelector('#pinp'); inp.value=value||'';
    document.body.appendChild(bg);
    const done=v=>{ bg.remove(); document.removeEventListener('keydown',onk); try{prev&&prev.focus();}catch(_){}; resolve(v); };
    const onk=e=>{ if(e.key==='Escape'){e.preventDefault();done(null);} if(e.key==='Enter'){e.preventDefault();done(inp.value);} };
    document.addEventListener('keydown',onk);
    bg.addEventListener('click',e=>{ if(e.target===bg) done(null); });
    bg.querySelector('#pcancel').onclick=()=>done(null);
    bg.querySelector('#pok').onclick=()=>done(inp.value);
    inp.focus(); inp.select();
  });
}

// 「未分類」デッキをまとめてAI分類。
async function recategorizeAll(){
  const targets=decks.filter(d=>!d.category||!d.category.trim()||d.category==='未分類');
  if(!targets.length){showToast('未分類の教材はありません');return;}
  loading(`未分類 ${targets.length} 件をAIで分類中…`);
  for(const d of targets){
    try{const c=await categorize(d.source||d.flashText);if(c)d.category=c;}catch(_){}
  }
  saveDecks();
  library();
}

async function make(){
  const src=document.getElementById('src').value.trim();
  const parent=document.getElementById('cat').value.trim();   // 親(大項目)。空ならAIが提案
  const err=document.getElementById('err');
  if(src.length<10){err.innerHTML=`<div class="banner">本文が短すぎます。もう少し貼り付けてください。</div>`;return;}
  const aiMode=cMode==="ai", gen=cGen, split=cSplit, useAI=aiMode||gen;
  const restore=(msg,ok)=>{ createView();
    document.getElementById('src').value=src; document.getElementById('cat').value=parent;
    if(msg){ const e=document.getElementById('err');
      if(/設定でキー/.test(msg)) e.innerHTML=`<div class="banner">${esc(msg)} <span class="lnk" id="goset">⚙設定を開く</span></div>`, (document.getElementById('goset')||{}).onclick=settingsView;
      else e.innerHTML=`<div class="banner${ok?' ok':''}">${esc(msg)}</div>`; } };

  genAbort=new AbortController();
  try{
    // 1) 分割プラン（AI不使用なら分割せず1教材。プラン失敗時も丸ごと1教材にフォールバック）
    let sections;
    if(!useAI){ sections=[{p:{},text:src}]; }
    else{
      loading("構成を分析中…（分け方を計画）",{abortable:true});
      try{ sections=buildSections(src, await planDecks(src, split)); }
      catch(e){ if(e&&e.code==='abort'){ restore('作成を中断しました。'); return; } sections=[{p:{},text:src}]; }
      if(!sections.length) sections=[{p:{},text:src}];
    }

    // 2) 複数になる場合だけ、件数とAPI回数をモーダルで確認
    const perDeck=(aiMode?1:0)+(gen?1:0);
    if(sections.length>1){
      const ok=await showModal({title:`${sections.length}個の教材に分けて作成`,
        body:`このあとAI呼び出しが約 ${sections.length*perDeck} 回 発生します（BYOKキーの実費）。\n作成中は「中断する」も押せます。`,
        confirm:'作成する'});
      if(!ok){ restore(); return; }
    }

    // 3) 各教材を生成（1件失敗は継続。中断/キー無効は即中止し、できたぶんは保存）
    const made=[]; let stopMsg='';
    for(let i=0;i<sections.length;i++){
      if(genAbort.signal.aborted){ stopMsg='中断しました'; break; }
      const p=sections[i].p||{}, text=sections[i].text;
      loading(`教材を作成中…（${i+1} / ${sections.length}）`,{abortable:true});
      try{
        let flashText=text;
        if(aiMode){ try{ flashText=await reconstruct(text); }catch(e){ if(e&&(e.code==='abort'||e.code==='auth'))throw e; flashText=text; } }
        let quiz=[], status="unset";
        if(gen){ try{ quiz=await genQuiz(text); status="ready"; }catch(e){ if(e&&(e.code==='abort'||e.code==='auth'))throw e; } }
        let big=parent||p.big||'';
        if(!big && sections.length===1){ try{ big=await categorize(text); }catch(_){} }
        const category=joinCat(big||'未分類', p.mid, p.small);
        const t=(p.title||text.replace(/\s+/g,' ').trim()).trim();
        made.push({id:uid(), title:t.slice(0,20)+(t.length>20?"…":""),
          category, flashMode:aiMode?"ai":"original", flashText, quiz, quizStatus:status,
          source:text, createdAt:new Date().toISOString()});
      }catch(e){
        if(e&&e.code==='abort'){ stopMsg='中断しました'; break; }
        if(e&&e.code==='auth'){ stopMsg=friendlyErr(e); break; }     // 鍵が無効なら残りも無駄なので即中止
        if(sections.length===1){ stopMsg=friendlyErr(e); }            // 単一はそのまま失敗理由を提示
      }
    }
    if(made.length){
      decks=made.concat(decks); saveDecks();
      if(stopMsg) showToast(`${made.length}件を作成（${stopMsg}で停止）`);
      // 単一教材＆クイズ生成ありなら、信頼ガードのレビュー画面へ（複数は枚数が多すぎるため自動）
      if(made.length===1 && sections.length===1){
        cur=made[0];
        if(gen && made[0].quiz.length){ genAbort=null; await reviewQuiz(made[0], made[0].quiz); }
        else deckDetail();
      } else library();
      return;
    }
    restore(stopMsg||'生成に失敗しました。本文を短くするか、もう一度お試しください。');
  } finally { genAbort=null; }
}

// ====== PDF intake (pdf.js, local extraction) ======
// PDFをローカルでテキスト化。サーバ不要・APIキー不要（職場でも使える）。
async function extractPdf(file){
  const lib=window.pdfjsLib;
  if(!lib) throw new Error("pdf.jsを読み込めていません（ネット接続を確認）");
  if(!lib.GlobalWorkerOptions.workerSrc)
    lib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const buf=await file.arrayBuffer();
  const pdf=await lib.getDocument({data:buf}).promise;
  let text="";
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const content=await page.getTextContent();
    text += content.items.map(it=>it.str).join("")+"\n";   // 日本語は語間スペース無しなので "" 連結
  }
  return text.replace(/\n{2,}/g,"\n").trim();
}

// ====== READER ======
let readerKey=null, wakeLockObj=null, staticMode=false;
const prefersReduced = !!(window.matchMedia && matchMedia('(prefers-reduced-motion:reduce)').matches);
async function requestWake(){ try{ if(navigator.wakeLock && !wakeLockObj) wakeLockObj=await navigator.wakeLock.request('screen'); }catch(_){ } }
function releaseWake(){ try{ wakeLockObj && wakeLockObj.release(); }catch(_){} wakeLockObj=null; }
function onVisWake(){ if(document.visibilityState==='visible' && playing) requestWake(); }
// リスナー/ロックの後始末（SPA遷移・stop時に必ず呼ぶ＝多重登録/リーク防止）
function teardownReader(){
  if(readerKey){ document.removeEventListener('keydown',readerKey); readerKey=null; }
  document.removeEventListener('visibilitychange',onVisWake);
  releaseWake();
}
function startReading(opts){
  teardownReader();
  const built=buildChunks(cur.flashText);
  chunks=built.chunks;sentStarts=built.sentStarts;
  idx=Math.max(0, Math.min(Math.max(0,chunks.length-1), (opts&&opts.from)|0));
  staticMode=false;
  const autostart=!prefersReduced;          // 動きの低減ONなら手動送り既定（自動進行オフ）
  playing=autostart;
  const maxSeek=Math.max(0,chunks.length-1);
  screenEl.innerHTML=`
  <div class="screen reader">
    <div class="rtop">
      <span>${esc(cur.title)}</span>
      <button class="btn sm ghost" id="rstatic" aria-pressed="false" title="自動送りをやめて全文を表示">全文表示</button>
      <button class="xbtn" id="x" aria-label="リーダーを閉じる"><span aria-hidden="true">✕</span></button>
    </div>
    <div class="progress"><i id="bar"></i></div>
    <div class="stage" id="stage" tabindex="0" role="button" aria-label="タップまたはSpaceで一時停止・再開">
      <div class="guide" aria-hidden="true"></div>
      <div id="flash" class="flash" aria-hidden="true"></div>
      <div class="pausedovl" aria-hidden="true">❙❙ タップ / Space で再開</div>
    </div>
    <div class="sr-only" id="srlive" aria-live="polite"></div>
    <div class="seekwrap">
      <input type="range" id="seek" min="0" max="${maxSeek}" value="${idx}" aria-label="読む位置">
      <div class="pos" id="pos"></div>
    </div>
    <div class="rctrl">
      <button id="rew" aria-label="前の文へ"><span aria-hidden="true">◀◀</span> 前の文</button>
      <button id="pp" class="main">${playing?'一時停止':'再生'}</button>
      <button id="fwd" aria-label="次の文へ">次の文 <span aria-hidden="true">▶▶</span></button>
    </div>
    <button class="btn ghost block" id="restart">↺ 最初から</button>
    <div class="hint">画面タップ／Space で一時停止・再開。◀◀▶▶ は文の頭出し、下のバーで好きな位置へ。
      <span class="sr-only">キーボード: スペースで再生／一時停止、左右キーで文の頭出し、上下キーで速度、Homeで最初から、Escで終了。</span></div>
  </div>`;
  const stage=document.getElementById('stage');
  document.getElementById('x').onclick=exitReader;
  document.getElementById('pp').onclick=togglePlay;
  document.getElementById('rew').onclick=()=>navSentence(-1);
  document.getElementById('fwd').onclick=()=>navSentence(1);
  document.getElementById('restart').onclick=restartReading;
  document.getElementById('seek').oninput=ev=>seekTo(+ev.target.value);
  document.getElementById('rstatic').onclick=staticReader;
  // ポインタ操作: タップ(移動<10px)=再生/停止、横スワイプ(>40px)=文移動。マウス/タッチ共通。
  let px=0,py=0,down=false;
  stage.addEventListener('pointerdown',e=>{px=e.clientX;py=e.clientY;down=true;});
  stage.addEventListener('pointerup',e=>{ if(!down)return; down=false;
    if(e.target.closest('button,input,a'))return;
    const dx=e.clientX-px, dy=e.clientY-py;
    if(Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy)) navSentence(dx<0?1:-1);
    else if(Math.abs(dx)<10 && Math.abs(dy)<10) togglePlay();
  });
  // キーボード（textarea/input中は無効）
  readerKey=function(e){
    if(/^(INPUT|TEXTAREA|SELECT)$/.test((e.target&&e.target.tagName)||'')) return;
    switch(e.key){
      case ' ': case 'Spacebar': e.preventDefault(); togglePlay(); break;
      case 'ArrowLeft': e.preventDefault(); navSentence(-1); break;
      case 'ArrowRight': e.preventDefault(); navSentence(1); break;
      case 'ArrowUp': e.preventDefault(); setSpeed(speed+1); break;
      case 'ArrowDown': e.preventDefault(); setSpeed(speed-1); break;
      case 'Home': e.preventDefault(); restartReading(); break;
      case 'Escape': e.preventDefault(); exitReader(); break;
    }
  };
  document.addEventListener('keydown',readerKey);
  document.addEventListener('visibilitychange',onVisWake);
  paint(); setPP(); setPaused(!playing);
  try{ stage.focus({preventScroll:true}); }catch(_){ stage.focus(); }
  // Web書体の読込が遅れると寸法がズレるため、読込完了で一度だけ再フィット（自動再生中はtickが直す）
  if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(()=>{ const ff=document.getElementById('flash'); if(ff&&!playing) paint(); }); }
  if(autostart){ requestWake(); countdown(3); }
}

function setSpeed(v){ speed=Math.max(1,Math.min(10,v|0)); paint(); }
function setPaused(p){ const s=document.getElementById('stage'); if(s)s.classList.toggle('paused',p); }
// SR向け: 停止時に「断片」でなく現在の文全体を1回だけ読み上げる（自動再生中は読み上げない）
function currentSentenceText(){
  const s=sentenceOf(idx), a=sentStarts[s], b=(sentStarts[s+1]!==undefined)?sentStarts[s+1]:chunks.length;
  return chunks.slice(a,b).join('');
}

function sentenceOf(i){let s=0;for(let k=0;k<sentStarts.length;k++){if(sentStarts[k]<=i)s=k;else break;}return s;}
// 現在位置を描画するだけ（idxは進めない）。再生/一時停止/シーク/ナビで共用。
// 塊全体がステージ幅に収まるよう font-size を1パスで縮小（中央寄せは flex に任せる）。
function fitFlash(f){
  const stage=f.parentElement; if(!stage)return;
  f.style.fontSize=''; f.style.transform='';     // CSS既定(--flash-fs)へ戻し、旧translateを除去
  const avail=Math.max(40, stage.clientWidth-24);
  const w=f.scrollWidth;
  if(w>avail && w>0){
    const cur=parseFloat(getComputedStyle(f).fontSize)||40;
    f.style.fontSize=Math.max(20, Math.floor(cur*avail/w))+'px';
  }
}
function paint(){
  const f=document.getElementById('flash'),bar=document.getElementById('bar'),
        sk=document.getElementById('seek'),pos=document.getElementById('pos');
  if(!f)return;
  f.className='flash';f.innerHTML=renderFlash(chunks[idx]||'');
  fitFlash(f);
  const n=chunks.length;
  if(bar)bar.style.width=(n?((idx+1)/n*100):0)+'%';
  if(sk&&document.activeElement!==sk)sk.value=idx;
  if(pos)pos.textContent=n?`${Math.min(idx+1,n)}/${n}（コマ）・ 文 ${sentenceOf(idx)+1}/${sentStarts.length} ・ 速度 ${speed}`:'本文なし';
}
function countdown(n){const f=document.getElementById('flash');if(!f)return;
  if(!playing){ paint(); return; }
  if(n<=0){ tick(); return; }
  f.className='flash countdown';
  f.innerHTML=`<span class="pre"></span><span class="focus">${n}</span><span class="post"></span>`;
  fitFlash(f);
  timer=setTimeout(()=>countdown(n-1),700);}
function tick(){
  if(!playing)return;const f=document.getElementById('flash');if(!f)return;
  if(idx>=chunks.length){playing=false;setPP();setPaused(true);releaseWake();timer=setTimeout(afterFlash,450);return;}
  paint();const d=delayFor(chunks[idx]);idx++;timer=setTimeout(tick,d);}
function togglePlay(){
  if(!chunks.length)return;
  if(!playing && idx>=chunks.length) idx=0;   // 末尾で再生したら頭出し
  playing=!playing;setPP();setPaused(!playing);
  if(playing){requestWake();tick();}else{clearTimeout(timer);releaseWake();announceSentence();}}
// 文単位の巻き戻し/送り。常に一時停止して現在地を表示する。
function navSentence(dir){
  clearTimeout(timer);playing=false;setPP();setPaused(true);
  const s=sentenceOf(idx);
  let target;
  if(dir>0){ target = (sentStarts[s+1]!==undefined)?sentStarts[s+1]:chunks.length-1; }
  else { target = (idx>sentStarts[s])?sentStarts[s]:sentStarts[Math.max(0,s-1)]; }
  idx=Math.max(0,Math.min(chunks.length-1,target));paint();announceSentence();
}
function seekTo(i){clearTimeout(timer);playing=false;setPP();setPaused(true);
  idx=Math.max(0,Math.min(chunks.length-1,i|0));paint();announceSentence();}
function restartReading(){clearTimeout(timer);idx=0;playing=true;setPP();setPaused(false);requestWake();tick();}
// 全文を静的に表示（RSVPを任意化。読字/認知配慮・動きの低減）
function staticReader(){
  stop();
  screenEl.innerHTML=`
  <div class="screen reader">
    <div class="rtop"><span>${esc(cur.title)}</span>
      <button class="btn sm ghost" id="rflash">フラッシュで読む</button>
      <button class="xbtn" id="x" aria-label="リーダーを閉じる"><span aria-hidden="true">✕</span></button></div>
    <div class="statictext" tabindex="0">${esc(cur.flashText).replace(/\n/g,'<br>')}</div>
    <button class="btn block" id="done">${cur.quizStatus==='ready'?'読み終えた → 問題へ':'読み終えた'}</button>
  </div>`;
  document.getElementById('x').onclick=()=>{ noteRead(cur.id, Math.max(0,chunks.length-1)); deckDetail(); };
  document.getElementById('rflash').onclick=()=>startReading();
  document.getElementById('done').onclick=()=>{ noteRead(cur.id, Math.max(0,chunks.length-1)); if(cur.quizStatus==='ready') startQuiz(); else deckDetail(); };
}
function afterFlash(){
  noteRead(cur.id, Math.max(0,chunks.length-1));
  if(cur.quizStatus==='ready'){startQuiz();}
  else{screenEl.innerHTML=`<div class="screen result">
    <div class="score" style="font-size:2.5rem;">読了 ✓</div>
    <div class="rmsg">フラッシュ完了</div>
    <div class="rsub">この教材はまだ問題が未設定です。問題を追加すると定着を確認できます。</div>
    <button class="btn block" id="g">AIで問題を作る</button>
    <button class="btn ghost block" id="b">教材に戻る</button></div>`;
    focusHeading();
    document.getElementById('b').onclick=deckDetail;
    document.getElementById('g').onclick=()=>quizGenAndReview(cur);
  }
}

// ====== QUIZ ======
// opts.only = 復習する元インデックス配列（未指定なら全問）。各設問に元インデックス _oi を持たせる。
function startQuiz(opts){
  clearTimeout(timer); teardownReader();   // リーダーから来た場合のリスナー/タイマー後始末
  const only=opts&&Array.isArray(opts.only)?opts.only:null;
  activeQuiz = only ? only.map(i=>Object.assign({},cur.quiz[i],{_oi:i}))
                    : cur.quiz.map((q,i)=>Object.assign({},q,{_oi:i}));
  quizI=0;score=0;wrongThis=[];
  if(!activeQuiz.length){ deckDetail(); return; }
  renderQuiz();
}
const MK_OK='○', MK_NG='✕';
function renderQuiz(){
  answered=false;const q=activeQuiz[quizI];const total=activeQuiz.length;
  screenEl.innerHTML=`<div class="screen quiz">
    <div class="qhead" tabindex="-1">まとめ問題</div>
    <div class="qcount">${esc(cur.title)} ・ ${quizI+1} / ${total}問</div>
    <div class="qprog"><i style="width:${Math.round(quizI/total*100)}%"></i></div>
    <div class="question">${esc(q.q)}</div>
    <div id="opts" role="group" aria-label="選択肢">${q.o.map((o,i)=>o===''?'':`<button class="opt" data-i="${i}"><span class="mk" aria-hidden="true"></span><span>${esc(o)}</span></button>`).join('')}</div>
    <div id="feedslot" aria-live="polite"></div></div>`;
  focusHeading();
  const live=q.o.filter(o=>o!=='').length;   // 空paddingは描画しない
  const pick=i=>answer(i);
  document.getElementById('opts').onclick=e=>{const b=e.target.closest('.opt');if(!b||answered)return;pick(+b.dataset.i);};
  // PCの数字キー（実在する選択肢数まで）
  document.onkeydown=e=>{ if(answered)return; const n=parseInt(e.key,10); if(n>=1&&n<=live){e.preventDefault();pick(n-1);} };
}
function answer(pick){
  if(answered)return; answered=true; document.onkeydown=null;
  const q=activeQuiz[quizI], correct=pick===q.a;
  if(correct)score++; else wrongThis.push(q._oi);
  document.querySelectorAll('.opt').forEach((el,i)=>{
    const mk=el.querySelector('.mk'); el.setAttribute('aria-disabled','true');
    if(i===q.a){el.classList.add('correct'); if(mk)mk.textContent=MK_OK;}
    else if(i===pick){el.classList.add('wrong'); if(mk)mk.textContent=MK_NG;}
    else el.classList.add('dim');
  });
  const last=quizI===activeQuiz.length-1;
  const head=correct?'<b>正解</b>':'<b>正解はこちら</b>';
  const srcHtml=q.src?`<div class="src">本文の根拠：${esc(q.src)}</div>`:'';
  document.getElementById('feedslot').innerHTML=
    `<div class="feed" role="alert"><span class="sr-only">${correct?'正解':'不正解'}。</span>${head} ${esc(q.e||'')}${correct?'':`<br>正答：${esc(q.o[q.a]||'')}`}${srcHtml}</div>
     <button class="btn block" id="next">${last?'結果を見る':'次の問題'}</button>`;
  const nx=document.getElementById('next');
  nx.onclick=()=>{ if(last)result(); else{quizI++;renderQuiz();} };
  try{ nx.scrollIntoView({block:'nearest'}); }catch(_){}
}
function result(){
  const total=activeQuiz.length, pct=total?score/total:0;
  // 記憶レイヤへ保存（背骨JSONとは別キー）。誤答→翌日 / 全問正解→3日後の簡易due。
  const prev=getProg(cur.id)||{};
  setProg(cur.id,{
    attempts:(prev.attempts||0)+1, lastScore:score, bestScore:Math.max(prev.bestScore||0,score),
    total, lastStudiedAt:nowISO(), wrongIdx:wrongThis.slice(),
    due: (score===total)?addDays(nowISO(),3):addDays(nowISO(),1)
  });
  const msg = pct===1?'完璧。定着しています。' : pct>=.8?'よく入っています。' : pct>=.5?'いい感じ。あと一歩。' : 'ここを重点復習に。';
  let sub = pct===1?'フラッシュで入れて、問題で出す。このループが効いています。'
          : '間違えた問題だけ、もう一度。能動的に思い出すほど定着します。';
  // 低スコア時は外した論点を1-2件名指し
  if(pct<.5 && wrongThis.length){
    const names=wrongThis.slice(0,2).map(i=>(cur.quiz[i]&&cur.quiz[i].q||'').slice(0,18)).filter(Boolean);
    if(names.length) sub='とくに：'+names.map(n=>'「'+n+'…」').join(' / ');
  }
  const reviewBtn = wrongThis.length ? `<button class="btn block" id="rev">間違えた ${wrongThis.length}問 だけ復習</button>` : '';
  screenEl.innerHTML=`<div class="screen result">
    <div class="score">${score}<small> / ${total}</small></div>
    <div class="rmsg" tabindex="-1" role="status" aria-live="polite">${msg}</div>
    <div class="rsub">${esc(sub)}</div>
    ${reviewBtn}
    <button class="btn ${wrongThis.length?'ghost ':''}block" id="again">もう一度（全問）</button>
    <button class="btn ghost block" id="deck">教材に戻る</button>
    <button class="btn ghost block" id="back">ライブラリへ</button>
  </div>`;
  focusHeading();
  if(wrongThis.length) document.getElementById('rev').onclick=()=>{ const only=wrongThis.slice(); startQuiz({only}); };
  document.getElementById('again').onclick=()=>startQuiz();
  document.getElementById('deck').onclick=deckDetail;
  document.getElementById('back').onclick=library;
}

// ====== クイズ生成＋信頼ガード（Step4） ======
// 生成 → 自己検証 → レビュー画面。deck.quiz は採用分のみ確定する。
async function quizGenAndReview(deck){
  loading("4択を作成中…（生成＋自己点検でAPI約2回）",{abortable:true});
  genAbort=new AbortController();
  try{
    const items=await genQuiz(deck.source||deck.flashText);
    genAbort=null;
    await reviewQuiz(deck, items);
  }catch(e){
    genAbort=null;
    cur=deck; deckDetail();
    if(!(e&&e.code==='abort')) showToast('生成に失敗：'+friendlyErr(e));
  }
}
// 生成済み items を自己検証してレビュー画面へ。
async function reviewQuiz(deck, items){
  items=normalizeQuiz(items);   // src保持・空/重複/正解不明をここでも除去
  if(!items.length){ deck.quiz=[]; deck.quizStatus='unset'; saveDecks(); cur=deck; deckDetail(); showToast('有効な問題を作れませんでした'); return; }
  loading("作った問題を点検中…（本文との整合を自己検証）",{abortable:true});
  genAbort=new AbortController();
  let verdicts;
  try{ verdicts=await verifyQuiz(items, deck.source||deck.flashText); }
  catch(_){ verdicts=items.map(()=>({ok:true,unique:true,wrongClear:true,grounded:true,reason:''})); }
  finally{ genAbort=null; }
  const sel=items.map((_,i)=> verdicts[i]?!!verdicts[i].ok:true);   // 要確認は既定で除外
  renderReview(deck, items, verdicts, sel);
}
function renderReview(deck, items, verdicts, sel){
  const rows=items.map((q,i)=>{
    const v=verdicts[i]||{}, bad=!v.ok;
    const iss=[]; if(v.unique===false)iss.push('正解が一意でない'); if(v.wrongClear===false)iss.push('誤答が誤りと言い切れない'); if(v.grounded===false)iss.push('本文に根拠なし');
    const badge=bad?`<span class="rv-badge ng">要確認</span>`:`<span class="rv-badge ok">本文と整合</span>`;
    const opts=q.o.filter(o=>o!=='').map((o,oi)=>`<div class="rv-o${oi===q.a?' cor':''}"><span class="mk" aria-hidden="true">${oi===q.a?'○':'・'}</span>${esc(o)}</div>`).join('');
    return `<div class="rv-item${bad?' bad':''}${sel[i]?'':' dropped'}">
      <label class="rv-head"><input type="checkbox" data-i="${i}" ${sel[i]?'checked':''}><span class="rv-q">${esc(q.q)}</span>${badge}</label>
      <div class="rv-body">${opts}
        <div class="rv-e">${esc(q.e||'')}</div>
        ${q.src?`<div class="rv-src">本文の根拠：${esc(q.src)}</div>`:''}
        ${iss.length?`<div class="rv-issues">⚠ ${esc(iss.join(' / '))}${v.reason?'（'+esc(v.reason)+'）':''}</div>`:''}
      </div></div>`;
  }).join('');
  screenEl.innerHTML=`<div class="screen form">
    <div class="dtitle" tabindex="-1">問題の点検</div>
    <div class="meta">AIが本文だけを根拠に自己点検しました。「要確認」は既定で除外しています。採用する問題にチェックを残してください。</div>
    <div class="rv-summary" id="rvsum">採用 ${sel.filter(Boolean).length} / ${items.length}問</div>
    <div id="rvlist">${rows}</div>
    <button class="btn block" id="rvok">この内容で確定</button>
    <button class="btn ghost block" id="rvregen">全部作り直す</button>
    <button class="btn ghost block" id="rvskip">問題なしで保存</button>
  </div>`;
  focusHeading();
  document.getElementById('rvlist').onchange=e=>{ const cb=e.target.closest('input[type=checkbox]'); if(!cb)return;
    sel[+cb.dataset.i]=cb.checked;
    document.getElementById('rvsum').textContent=`採用 ${sel.filter(Boolean).length} / ${items.length}問`;
    const it=cb.closest('.rv-item'); if(it) it.classList.toggle('dropped',!cb.checked); };
  document.getElementById('rvok').onclick=()=>{
    const accepted=items.filter((_,i)=>sel[i]);
    deck.quiz=accepted; deck.quizStatus=accepted.length?'ready':'unset'; saveDecks();
    cur=deck; deckDetail(); showToast(`${accepted.length}問を採用しました`);
  };
  document.getElementById('rvregen').onclick=()=>quizGenAndReview(deck);
  document.getElementById('rvskip').onclick=()=>{ deck.quiz=[]; deck.quizStatus='unset'; saveDecks(); cur=deck; deckDetail(); };
}

function stop(){playing=false;clearTimeout(timer);teardownReader();document.onkeydown=null;}
// SPA遷移後にフォーカスを主見出しへ移す（WCAG 2.4.3）
function focusHeading(){
  const h=screenEl.querySelector('.dtitle,.lead,.qhead,.rmsg,.statictext');
  if(h){ h.setAttribute('tabindex','-1'); try{h.focus({preventScroll:true});}catch(_){h.focus();} }
}
library();
</script>
