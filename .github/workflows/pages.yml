name: Deploy trivia quiz to Pages

on:
  push:
    branches: ["claude/beginner-trivia-tool-n9bwzg"]
    paths:
      - "src/web/trivia_quiz/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site (trivia quiz as site root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/web/trivia_quiz

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
