<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>知っトク資格クイズ｜知ってると助かる知識</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="app-head">
        <button class="sound-toggle" id="soundToggle" title="音のオン/オフ" aria-label="音のオン/オフ">🔊</button>
        <h1>知っトク資格クイズ</h1>
        <p>知ってると助かる知識を、やさしく1問ずつ</p>
      </header>

      <!-- ===== スタート画面 ===== -->
      <section id="screen-start" class="screen active">
        <div class="best-banner" id="bestBanner"></div>
        <p class="lead">分野を選んでスタート。<br />各問に「どの資格で役立つ知識か」が出ます。</p>
        <div id="catGrid" class="cat-grid"><!-- JSで生成 --></div>
      </section>

      <!-- ===== クイズ画面 ===== -->
      <section id="screen-quiz" class="screen">
        <div class="quiz-bar">
          <span id="progressText">1 / 10</span>
          <span><span class="xp" id="xpText">0 XP</span> ・ <span class="streak" id="streakText">🔥 0</span></span>
        </div>
        <div class="progress"><span id="progressBar"></span></div>

        <div class="card">
          <div class="tags">
            <span class="cat-tag" id="catTag">分野</span>
            <span class="qual-tag" id="qualTag">資格</span>
          </div>
          <p class="question" id="questionText">問題文</p>
          <div class="choices" id="choices"><!-- JSで生成 --></div>

          <div class="explain" id="explain">
            <div class="verdict-row">
              <p class="verdict" id="verdict">正解！</p>
              <span class="xp-gain" id="xpGain" style="display: none"></span>
            </div>
            <h3 class="c-conclusion">結論</h3>
            <p id="exConclusion"></p>
            <h3 class="c-why">なぜそうなるの？</h3>
            <p id="exWhy"></p>
            <h3 class="c-useful">こう役立つ</h3>
            <p id="exUseful"></p>
            <div id="triviaBlock">
              <h3 class="c-trivia">おまけ豆知識</h3>
              <p id="exTrivia"></p>
            </div>
            <button class="next-btn" id="nextBtn">次の問題へ →</button>
          </div>
        </div>
      </section>

      <!-- ===== 結果画面 ===== -->
      <section id="screen-result" class="screen">
        <div class="card result-card">
          <div class="result-emoji" id="resultEmoji">🎉</div>
          <p class="result-score">
            <span id="resultScore">0</span
            ><small> / <span id="resultTotal">0</span> 問正解</small>
          </p>
          <p class="new-best" id="newBest">🏅 自己ベスト更新！</p>
          <p class="result-msg" id="resultMsg"></p>
          <div class="result-stats">
            <div>
              <span class="num" id="resultRate">0%</span>
              <span class="lbl">正答率</span>
            </div>
            <div>
              <span class="num" id="resultXp">0</span>
              <span class="lbl">獲得XP</span>
            </div>
            <div>
              <span class="num" id="resultBestStreak">0</span>
              <span class="lbl">最高連続</span>
            </div>
          </div>
          <div class="badges" id="badges"><!-- JSで生成 --></div>
          <button class="primary-btn" id="retryBtn">もう一度チャレンジ</button>
          <button class="ghost-btn" id="homeBtn">分野を選び直す</button>
        </div>
      </section>

      <footer class="app-foot">
        知るほど、ちょっと得する。 — 知っトク資格クイズ
      </footer>
    </div>

    <script src="questions.js"></script>
    <script>
      "use strict";

      // ---- 要素参照 ----
      const screens = {
        start: document.getElementById("screen-start"),
        quiz: document.getElementById("screen-quiz"),
        result: document.getElementById("screen-result"),
      };
      const catGrid = document.getElementById("catGrid");
      const bestBanner = document.getElementById("bestBanner");
      const progressText = document.getElementById("progressText");
      const progressBar = document.getElementById("progressBar");
      const xpText = document.getElementById("xpText");
      const streakText = document.getElementById("streakText");
      const catTag = document.getElementById("catTag");
      const qualTag = document.getElementById("qualTag");
      const questionText = document.getElementById("questionText");
      const choicesEl = document.getElementById("choices");
      const explainEl = document.getElementById("explain");
      const verdictEl = document.getElementById("verdict");
      const xpGainEl = document.getElementById("xpGain");
      const exConclusion = document.getElementById("exConclusion");
      const exWhy = document.getElementById("exWhy");
      const exUseful = document.getElementById("exUseful");
      const exTrivia = document.getElementById("exTrivia");
      const triviaBlock = document.getElementById("triviaBlock");
      const nextBtn = document.getElementById("nextBtn");
      const soundToggle = document.getElementById("soundToggle");

      const MAX_PER_SESSION = 10; // 1回の出題数の上限
      const BASE_XP = 10; // 正解の基礎XP
      const COMBO_XP = 5; // 連続正解1つにつき上乗せされるXP
      const BEST_KEY = "trivia_quiz_best_v1"; // localStorage キー
      const SOUND_KEY = "trivia_quiz_sound_v1"; // 音のオン/オフ保存

      // ---- 効果音（WebAudio。音源ファイル不要・オフラインでも鳴る） ----
      let audioCtx = null;
      let soundOn = true;
      try {
        soundOn = localStorage.getItem(SOUND_KEY) !== "off";
      } catch (e) {}

      function ensureAudio() {
        if (!audioCtx) {
          try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          } catch (e) {
            audioCtx = null;
          }
        }
        if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
      }

      // 単音を鳴らす小さなヘルパー
      function tone(freq, startAt, dur, type, peak) {
        const t0 = audioCtx.currentTime + startAt;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type || "sine";
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, t0);
        gain.gain.exponentialRampToValueAtTime(peak || 0.18, t0 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(t0);
        osc.stop(t0 + dur + 0.02);
      }

      // 正解：明るい上昇アルペジオ。連続正解が伸びるほど少し高く＝爽快感アップ
      function playCorrect(streakCount) {
        if (!soundOn) return;
        ensureAudio();
        if (!audioCtx) return;
        const shift = Math.min(streakCount - 1, 5) * 1.5; // 半音ずつ上げる
        const base = Math.pow(2, shift / 12);
        tone(523.25 * base, 0, 0.16, "triangle", 0.2); // ド
        tone(659.25 * base, 0.09, 0.16, "triangle", 0.2); // ミ
        tone(783.99 * base, 0.18, 0.26, "triangle", 0.22); // ソ
      }

      // 不正解：やわらかい下降音（きつくしすぎない）
      function playWrong() {
        if (!soundOn) return;
        ensureAudio();
        if (!audioCtx) return;
        tone(330, 0, 0.18, "sine", 0.16);
        tone(247, 0.12, 0.26, "sine", 0.16);
      }

      // 結果ファンファーレ
      function playFanfare() {
        if (!soundOn) return;
        ensureAudio();
        if (!audioCtx) return;
        [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
          tone(f, i * 0.12, 0.3, "triangle", 0.2);
        });
      }

      function updateSoundButton() {
        soundToggle.textContent = soundOn ? "🔊" : "🔇";
      }
      soundToggle.addEventListener("click", () => {
        soundOn = !soundOn;
        try {
          localStorage.setItem(SOUND_KEY, soundOn ? "on" : "off");
        } catch (e) {}
        updateSoundButton();
        if (soundOn) {
          ensureAudio();
          tone && audioCtx && tone(659.25, 0, 0.12, "triangle", 0.18);
        }
      });

      // ---- 出題状態 ----
      let session = [];
      let current = 0;
      let score = 0;
      let streak = 0;
      let bestStreak = 0;
      let xp = 0;
      let answered = false;
      let lastCategory = "mix"; // 「もう一度」で同じ分野を出すため

      // ---- ベスト記録（localStorage、使えない環境でも落ちないように） ----
      function loadBest() {
        try {
          return JSON.parse(localStorage.getItem(BEST_KEY)) || {};
        } catch (e) {
          return {};
        }
      }
      function saveBest(best) {
        try {
          localStorage.setItem(BEST_KEY, JSON.stringify(best));
        } catch (e) {
          /* 保存できなくても続行 */
        }
      }

      function renderBestBanner() {
        const best = loadBest();
        if (best.xp) {
          bestBanner.classList.add("show");
          bestBanner.innerHTML =
            "これまでのベスト：<b>" +
            best.xp +
            " XP</b>（正答率 " +
            (best.rate || 0) +
            "%）";
        }
      }

      // ---- 画面切り替え ----
      function show(name) {
        Object.values(screens).forEach((s) => s.classList.remove("active"));
        screens[name].classList.add("active");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // ---- 配列シャッフル（Fisher–Yates） ----
      function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      // ---- ある分野に登場する資格名の一覧（重複なし） ----
      function qualsOf(categoryKey) {
        const list = QUIZ_DATA.filter((q) => q.category === categoryKey).map(
          (q) => q.qual
        );
        return [...new Set(list)];
      }

      // ---- スタート画面のカテゴリボタンを生成 ----
      function buildCategoryButtons() {
        catGrid.innerHTML = "";
        Object.entries(CATEGORIES).forEach(([key, meta]) => {
          const n = QUIZ_DATA.filter((q) => q.category === key).length;
          const quals = qualsOf(key);
          const preview =
            quals.slice(0, 3).join("・") + (quals.length > 3 ? " ほか" : "");
          const btn = document.createElement("button");
          btn.className = "cat-btn";
          btn.innerHTML =
            '<span class="emoji">' +
            meta.emoji +
            "</span>" +
            meta.label +
            "（" +
            n +
            "問）" +
            '<span class="quals">' +
            preview +
            "</span>";
          btn.addEventListener("click", () => startQuiz(key));
          catGrid.appendChild(btn);
        });

        const mix = document.createElement("button");
        mix.className = "cat-btn mix";
        mix.innerHTML =
          '<span class="emoji">🎲</span>おまかせミックス<span class="quals">全分野からランダム出題</span>';
        mix.addEventListener("click", () => startQuiz("mix"));
        catGrid.appendChild(mix);
      }

      // ---- クイズ開始 ----
      function startQuiz(categoryKey) {
        lastCategory = categoryKey;
        const pool =
          categoryKey === "mix"
            ? QUIZ_DATA
            : QUIZ_DATA.filter((q) => q.category === categoryKey);
        session = shuffle(pool).slice(0, MAX_PER_SESSION);
        current = 0;
        score = 0;
        streak = 0;
        bestStreak = 0;
        xp = 0;
        show("quiz");
        renderQuestion();
      }

      // ---- 1問を描画 ----
      function renderQuestion() {
        answered = false;
        const q = session[current];
        const meta = CATEGORIES[q.category];

        progressText.textContent = current + 1 + " / " + session.length;
        progressBar.style.width = (current / session.length) * 100 + "%";
        xpText.textContent = xp + " XP";
        streakText.textContent = "🔥 " + streak;
        catTag.textContent = meta.emoji + " " + meta.label;
        qualTag.textContent = q.qual;
        questionText.textContent = q.question;

        choicesEl.innerHTML = "";
        q.choices.forEach((text, idx) => {
          const btn = document.createElement("button");
          btn.className = "choice";
          btn.innerHTML =
            '<span class="mark">' +
            "ABCD"[idx] +
            "</span><span>" +
            text +
            "</span>";
          btn.addEventListener("click", () => selectAnswer(idx));
          choicesEl.appendChild(btn);
        });

        explainEl.classList.remove("show");
      }

      // ---- 回答処理 ----
      function selectAnswer(idx) {
        if (answered) return;
        answered = true;
        const q = session[current];
        const buttons = Array.from(choicesEl.children);
        const isCorrect = idx === q.answer;

        buttons.forEach((b, i) => {
          b.disabled = true;
          if (i === q.answer) b.classList.add("correct");
          else if (i === idx) b.classList.add("wrong");
          else b.classList.add("dim");
        });

        if (isCorrect) {
          score++;
          streak++;
          bestStreak = Math.max(bestStreak, streak);
          // コンボボーナス：連続正解が伸びるほど多くもらえる
          const gain = BASE_XP + (streak - 1) * COMBO_XP;
          xp += gain;
          verdictEl.textContent = streak >= 3 ? "正解！ " + streak + "連続🔥" : "正解！ 🎯";
          verdictEl.className = "verdict ok";
          xpGainEl.textContent = "+" + gain + " XP";
          xpGainEl.style.display = "";
          playCorrect(streak);
        } else {
          streak = 0;
          verdictEl.textContent = "残念… 正解は「" + "ABCD"[q.answer] + "」";
          verdictEl.className = "verdict ng";
          xpGainEl.style.display = "none";
          playWrong();
        }
        xpText.textContent = xp + " XP";
        streakText.textContent = "🔥 " + streak;
        progressBar.style.width =
          ((current + 1) / session.length) * 100 + "%";

        const ex = q.explanation;
        exConclusion.textContent = ex.conclusion || "";
        exWhy.textContent = ex.why || "";
        exUseful.textContent = ex.useful || "";
        if (ex.trivia) {
          exTrivia.textContent = ex.trivia;
          triviaBlock.style.display = "";
        } else {
          triviaBlock.style.display = "none";
        }

        nextBtn.textContent =
          current + 1 >= session.length ? "結果を見る →" : "次の問題へ →";
        explainEl.classList.add("show");
      }

      // ---- 次の問題 / 結果へ ----
      nextBtn.addEventListener("click", () => {
        current++;
        if (current >= session.length) {
          showResult();
        } else {
          renderQuestion();
        }
      });

      // ---- 達成バッジを組み立てる ----
      function buildBadges(rate, total) {
        const badges = [];
        if (rate === 100) badges.push("👑 全問正解");
        if (bestStreak >= 5) badges.push("🔥 5連続コンボ");
        else if (bestStreak >= 3) badges.push("🔥 3連続コンボ");
        if (total >= 10) badges.push("🎓 10問完走");
        if (rate >= 70 && rate < 100) badges.push("✨ 好成績");
        return badges;
      }

      // ---- 紙吹雪 ----
      function launchConfetti() {
        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches)
          return;
        const colors = ["#38bdf8", "#fbbf24", "#22c55e", "#6366f1", "#ef4444"];
        for (let i = 0; i < 80; i++) {
          const c = document.createElement("div");
          c.className = "confetti";
          c.style.left = Math.random() * 100 + "vw";
          c.style.background = colors[i % colors.length];
          c.style.animationDuration = 2.2 + Math.random() * 1.8 + "s";
          c.style.animationDelay = Math.random() * 0.6 + "s";
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 4200);
        }
      }

      // ---- 結果画面 ----
      function showResult() {
        const total = session.length;
        const rate = Math.round((score / total) * 100);
        document.getElementById("resultScore").textContent = score;
        document.getElementById("resultTotal").textContent = total;
        document.getElementById("resultRate").textContent = rate + "%";
        document.getElementById("resultXp").textContent = xp;
        document.getElementById("resultBestStreak").textContent = bestStreak;

        let emoji, msg;
        if (rate === 100) {
          emoji = "🏆";
          msg = "全問正解！ もう知っトクマスターです。";
        } else if (rate >= 70) {
          emoji = "🎉";
          msg = "お見事。確実に賢くなっていますね。";
        } else if (rate >= 40) {
          emoji = "💡";
          msg = "いい調子。解説を読んだぶん、知識が増えました。";
        } else {
          emoji = "🌱";
          msg = "ここからが伸びしろ。解説こそが本番です。";
        }
        document.getElementById("resultEmoji").textContent = emoji;
        document.getElementById("resultMsg").textContent = msg;

        // バッジ
        const badgesEl = document.getElementById("badges");
        badgesEl.innerHTML = "";
        buildBadges(rate, total).forEach((label) => {
          const b = document.createElement("span");
          b.className = "badge";
          b.textContent = label;
          badgesEl.appendChild(b);
        });

        // 自己ベスト更新判定（XP基準）
        const best = loadBest();
        const newBestEl = document.getElementById("newBest");
        if (!best.xp || xp > best.xp) {
          saveBest({ xp: xp, rate: rate, score: score, total: total });
          newBestEl.classList.add("show");
        } else {
          newBestEl.classList.remove("show");
        }

        show("result");
        if (rate >= 70) {
          launchConfetti();
          playFanfare();
        }
      }

      document
        .getElementById("retryBtn")
        .addEventListener("click", () => startQuiz(lastCategory));
      document.getElementById("homeBtn").addEventListener("click", () => {
        renderBestBanner();
        show("start");
      });

      // ---- 初期化 ----
      buildCategoryButtons();
      renderBestBanner();
      updateSoundButton();
    </script>
  </body>
</html>
