# ========================================================================
# ペア別パラメータ設定（T4: 時間帯フィルター + ペア別パラメータ分離）
# ========================================================================
#
# 各通貨ペアについて、以下を定義する:
#   - allowed_sessions: 取引許可時間帯（JST、HH:MM形式、跨日OK）
#   - rsi_oversold / rsi_overbought: RSI閾値
#   - adx_threshold: ADXトレンド判定閾値
#   - atr_sl_mult: ATR ストップロス倍率（T3 ATR連動と統合予定）
#   - atr_tp1_mult: ATR 第1利確倍率（T3 ATR連動と統合予定）
#   - atr_tp2_mult: ATR 第2利確倍率（T3 ATR連動と統合予定）
#
# 時間帯ルールはresearcher調査「優先度2」に基づく。
# JST = UTC+9。ロンドン市場は通常JST 17:00-翌02:00（夏時間: 16:00-翌01:00）。
# NY市場は通常JST 22:00-翌07:00（夏時間: 21:00-翌06:00）。
#
# 跨日時間帯（例: start=21:00, end=02:00）は session_filter で正しく処理される。
#
# RSI 閾値の根拠 (2026-05-03 P1-1+3 strategy-validator 検証):
#   PR #7 で導入された RSI 30/70 (USD_JPY/EUR_USD) と 25/75 (GBP_JPY) は
#   外部リサーチ提案で投入されたが、バックテスト未検証だった。
#   yfinance M15 60日 (2026-02〜05) で再検証した結果:
#     - USD/JPY RSI 30/70 ATR 2.0 → PF 0.46 / SR -1.99 (エッジ消失)
#     - USD/JPY RSI 35/65 ATR 2.0 → PF 1.97 / SR 2.89 (95%CI [2.13, 3.66])
#     - EUR/USD RSI 35/65 ATR 2.0 → PF 1.60
#   詳細: docs/strategy_validation_phase1.md, docs/phase1_synthesis.md
#   → 検証済み値 (35/65) に戻す。長期 H1 データでの再検証後に再調整する。
# ========================================================================

EUR_USD:
  allowed_sessions:
    - {start: "21:00", end: "02:00", label: "LDN-NY"}
  rsi_oversold: 35     # was 30 — P1-1+3 検証で 35/65 が PF 1.60 (vs 30/70 未検証)
  rsi_overbought: 65   # was 70
  adx_threshold: 25
  atr_sl_mult: 1.5
  atr_tp1_mult: 1.0
  atr_tp2_mult: 3.0

USD_JPY:
  allowed_sessions:
    - {start: "09:00", end: "11:00", label: "Tokyo-AM"}
    - {start: "21:00", end: "02:00", label: "LDN-NY"}
  rsi_oversold: 35     # was 30 — P1-1+3 検証で 30/70 は PF 0.46 (エッジ消失), 35/65 は PF 1.97
  rsi_overbought: 65   # was 70
  adx_threshold: 20
  atr_sl_mult: 1.5
  atr_tp1_mult: 1.0
  atr_tp2_mult: 3.0

GBP_JPY:
  allowed_sessions:
    - {start: "16:00", end: "17:00", label: "Tokyo-LDN"}
    - {start: "21:00", end: "02:00", label: "LDN-NY"}
  rsi_oversold: 35     # was 25 — BollingerReversal class default は 35/65
  rsi_overbought: 65   # was 75
  adx_threshold: 25
  # 高ボラなのでSL広め
  atr_sl_mult: 2.0
  atr_tp1_mult: 1.5
  atr_tp2_mult: 4.0

AUD_USD:
  allowed_sessions:
    - {start: "09:00", end: "15:00", label: "Tokyo-Sydney"}
  rsi_oversold: 30
  rsi_overbought: 70
  adx_threshold: 25
  atr_sl_mult: 1.5
  atr_tp1_mult: 1.0
  atr_tp2_mult: 3.0

GBP_USD:
  allowed_sessions:
    - {start: "21:00", end: "02:00", label: "LDN-NY"}
  rsi_oversold: 30
  rsi_overbought: 70
  adx_threshold: 25
  atr_sl_mult: 1.8
  atr_tp1_mult: 1.2
  atr_tp2_mult: 3.5

EUR_JPY:
  allowed_sessions:
    - {start: "16:00", end: "17:00", label: "Tokyo-LDN"}
    - {start: "21:00", end: "02:00", label: "LDN-NY"}
  rsi_oversold: 30
  rsi_overbought: 70
  adx_threshold: 25
  atr_sl_mult: 1.8
  atr_tp1_mult: 1.2
  atr_tp2_mult: 3.5
