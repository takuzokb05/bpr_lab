# ========================================================================
# ペア別パラメータ設定（T4: 時間帯フィルター + ペア別パラメータ分離）
# ========================================================================
#
# 各通貨ペアについて、以下を定義する:
#   - allowed_sessions: 取引許可時間帯（JST、HH:MM形式、跨日OK）
#   - rsi_oversold / rsi_overbought: RSI閾値
#   - adx_threshold: ADXトレンド判定閾値（戦略のシグナル発生時のフィルター用）
#   - atr_sl_mult: ATR ストップロス倍率（T3 ATR連動と統合予定）
#   - atr_tp1_mult: ATR 第1利確倍率（T3 ATR連動と統合予定）
#   - atr_tp2_mult: ATR 第2利確倍率（T3 ATR連動と統合予定）
#
# 監査A4対応: RegimeDetector 用の閾値も pair_config で上書き可能（任意）。
# 未指定時は src/config.py のグローバル値（REGIME_*）が使われる。
#   - regime_adx_trending: RegimeDetectorのトレンド判定閾値（デフォルト 20）
#   - regime_adx_ranging: RegimeDetectorのレンジ判定閾値（デフォルト 15）
#   - regime_atr_volatile_ratio: ATRボラティリティ閾値（デフォルト 2.0）
#   - regime_bbw_squeeze_ratio: BBWスクイーズ閾値（デフォルト 0.5）
# 注: adx_threshold（戦略フィルター用）と regime_adx_trending（レジーム分類用）は
# 役割が異なる。前者はシグナル発生条件、後者は exposure_multiplier 計算用。
#
# 時間帯ルールはresearcher調査「優先度2」に基づく。
# JST = UTC+9。ロンドン市場は通常JST 17:00-翌02:00（夏時間: 16:00-翌01:00）。
# NY市場は通常JST 22:00-翌07:00（夏時間: 21:00-翌06:00）。
#
# 跨日時間帯（例: start=21:00, end=02:00）は session_filter で正しく処理される。
#
# RSI 閾値の根拠（時系列）:
#   PR #7  : 外部リサーチ提案で 30/70 (USD/EUR), 25/75 (GBP) を投入（バックテスト未検証）
#   PR #11 : Phase 1 (M15 60日) 検証で全ペア 35/65 に変更
#            - USD/JPY M15 30/70 → PF 0.46 / 35/65 → PF 1.97
#            - EUR/USD M15 35/65 → PF 1.60
#   PR #13 : Phase 2 (H1 730日) 検証で EUR/USD のみ 30/70 へ再調整
#            理由: H1 では EUR/USD 30/70 列が最強 (PF 1.51〜1.91, OOS PF 1.49)、
#                  35/65 列は OOS PF 0.98 で損益分岐。OOS Trades 47 で統計十分。
#            USD/JPY は H1 で全グリッド負エッジ (35/65 で PF 0.91, OOS PF 0.42)。
#                     M15 で測れる範囲では 35/65 が最善のため当面維持し、
#                     戦略リフレッシュは別タスクで検討。
#   詳細: docs/strategy_validation_phase1.md, docs/strategy_validation_h1.md,
#         docs/phase1_synthesis.md, docs/phase2_synthesis.md
# ========================================================================

EUR_USD:
  allowed_sessions:
    - {start: "21:00", end: "02:00", label: "LDN-NY"}
  rsi_oversold: 30     # PR #11 で 30→35、PR #13 で H1 730日結果により 35→30 に戻す
  rsi_overbought: 70   # PR #11 で 70→65、PR #13 で H1 730日結果により 65→70 に戻す
  adx_threshold: 25
  atr_sl_mult: 1.5
  atr_tp1_mult: 1.0
  atr_tp2_mult: 3.0

USD_JPY:
  allowed_sessions:
    - {start: "09:00", end: "11:00", label: "Tokyo-AM"}
    - {start: "21:00", end: "02:00", label: "LDN-NY"}
  rsi_oversold: 35     # PR #11 で適用: H1 でも代替 30/70 がより悪いため当面維持
  rsi_overbought: 65   # PR #11 で適用
  adx_threshold: 20
  atr_sl_mult: 1.5
  atr_tp1_mult: 1.0
  atr_tp2_mult: 3.0

GBP_JPY:
  allowed_sessions:
    - {start: "16:00", end: "17:00", label: "Tokyo-LDN"}
    - {start: "21:00", end: "02:00", label: "LDN-NY"}
  rsi_oversold: 35     # was 25 — BollingerReversal class default は 35/65
  rsi_overbought: 65   # was 75
  adx_threshold: 25
  # 高ボラなのでSL広め
  atr_sl_mult: 2.0
  atr_tp1_mult: 1.5
  atr_tp2_mult: 4.0

AUD_USD:
