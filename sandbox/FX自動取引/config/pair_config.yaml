    - {start: "16:00", end: "17:00", label: "Tokyo-LDN"}
    - {start: "21:00", end: "02:00", label: "LDN-NY"}
  rsi_oversold: 25
  rsi_overbought: 75
  adx_threshold: 25
  # 高ボラなのでSL広め
  atr_sl_mult: 2.0
  atr_tp1_mult: 1.5
  atr_tp2_mult: 4.0

