  rsi_oversold: 30
  rsi_overbought: 70
  adx_threshold: 25
  atr_sl_mult: 1.5
  atr_tp1_mult: 1.0
  atr_tp2_mult: 3.0

GBP_USD:
  allowed_sessions:
    - {start: "21:00", end: "02:00", label: "LDN-NY"}
  rsi_oversold: 30
  rsi_overbought: 70
  adx_threshold: 25
  atr_sl_mult: 1.8
  atr_tp1_mult: 1.2
  atr_tp2_mult: 3.5

EUR_JPY:
