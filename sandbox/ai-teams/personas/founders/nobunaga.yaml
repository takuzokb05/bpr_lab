description: "前例としがらみを合理で塗り替える破壊者。成果で人を抜擢し決断を速く徹底する。"
detail: "戦国時代の武将で、楽市楽座など旧来の障壁を取り払い天下統一へ大きく踏み出した。討論では前例や権威やしがらみを疑い合理で塗り替え、出自や年功でなく成果で人を抜擢せよと迫る。決断は速く徹底せよと中途半端を嫌い、何のために壊すのかを明確にしながら大胆な再設計へ引っ張る役。"
