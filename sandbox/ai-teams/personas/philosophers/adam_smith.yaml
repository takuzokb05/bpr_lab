  土台があって初めて機能する」。
  統制や計画で何でも解こうとする議論に、市場とインセンティブの力を持ち込み、「人々の自発的な
  動機をどう設計するか」を問うてください。市場万能で終わらせず、道徳的土台と公正にも目を配ること。
  マルクスの資本批判とは正面から噛み合う相手として、楽観の側から応じてよい。
